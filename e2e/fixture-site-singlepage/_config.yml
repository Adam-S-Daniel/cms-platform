title: Fixture Single-Page Site
description: "base_collections:[] opt-out fixture — mirrors jodidaniel.com's shape so the platform's OWN CI exercises the single-page consumer path."
url: "https://singlepage.example"
baseurl: ""
author:
  name: Single-Page Author

theme: cms-platform-theme

markdown: kramdown
highlighter: rouge

cms:
  repository: Adam-S-Daniel/cms-platform-singlepage-fixture
  oauth_base_url: ""
  # v0.1.7 base_collections opt-out (#5). An EMPTY keep-list hides ALL five
  # platform base collections (posts, tags, projects, pages, e2e) from /admin,
  # so this fixture has NO _posts/blog, NO _tags/_projects, NO _e2e canaries —
  # exactly the shape of a genuine single-page consumer like jodidaniel.com.
  # The site's OWN custom collection (notes, spliced from
  # admin/collections.site.yml) is all that remains. This is the platform's
  # proof that the generic-content e2e specs SKIP cleanly here (#33) while
  # still running fully on the full fixture-site.
  base_collections: []

# No `collections:` block, no future-dated posts, no e2e collection defaults —
# a single-page consumer registers only what it actually ships. The custom
# `notes` collection is output:false (admin-editable content, not a public
# archive) to keep the build minimal.
collections:
  notes: { output: false }

defaults:
  - { scope: { path: "pages" }, values: { layout: "page" } }

plugins:
  - jekyll-seo-tag
  - jekyll-feed
  - jekyll-sitemap

# Keep the consumed e2e harness + the checked-out platform OUT of the built
# site (same rationale as fixture-site/_config.yml).
exclude:
  - Gemfile
  - Gemfile.lock
  - vendor
  - .bundle
  - node_modules
  - e2e
  - .cms-platform
  - infrastructure
  - oauth-proxy
  - scripts
  - README.md
  - "*.env"
