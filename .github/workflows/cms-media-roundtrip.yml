# Reusable prod media-roundtrip loop for platform sites.
#
# A consuming site calls this from a thin wrapper that owns the schedule /
# push / workflow_dispatch triggers + run-name (see
# examples/site/.github/workflows/cms-media-roundtrip.yml). The e2e
# harness, the cms-recursion-gate + await-prod-deploy + post-failure-comment
# composites all live in the PLATFORM repo, so each job checks the platform
# out into `.cms-platform/` and runs the suite from there. Site identity
# (CMS_PROD_URL / CMS_APEX) + the PROD_PLAYGROUND_MODE sunset gate resolve
# to the CALLER's repo VARS under workflow_call.
#
# Runs the full Decap Media-UI lifecycle end-to-end against prod:
# upload a unique image via the Media UI → attach to a real _posts/
# entry → publish → assert it loads → remove from the post → publish →
# delete via the Media UI → assert the image URL 404s. See
# e2e/cms-media-roundtrip.spec.js for the rationale.
#
# PLATFORM PORT NOTES (vs adamdaniel.ai@origin/main): same shape as
# cms-publish-loop-prod.yml — site identity via repo VARS, GHCR ci-runner
# image + build-image job + container: block DROPPED in favour of inline
# deps, stuck-PR diagnostic DROPPED. The shared prod-mutating-loop lane,
# await-prod-deploy gate, recursion-gate job, and the PROD_PLAYGROUND_MODE
# sunset gate are preserved.
#
# Sunset path: gated on the repo variable `PROD_PLAYGROUND_MODE` (see
# cms-publish-loop-prod.yml).
name: CMS Media Roundtrip — Prod (real upload + delete) (reusable)

on:
  workflow_call:
    inputs:
      platform_repo:
        description: "owner/name of the platform repo holding the e2e harness + composite actions."
        required: false
        type: string
        default: Adam-S-Daniel/cms-platform
      platform_ref:
        description: "Tag/sha of the platform repo to fetch the harness from (pin to the same ref as this workflow)."
        required: false
        type: string
        default: main
    secrets:
      CMS_E2E_PAT:
        required: false

permissions:
  # The spec drives admin via a fine-grained PAT (CMS_E2E_PAT); the
  # workflow itself only needs contents:read. `pull-requests: write` is
  # for the post-failure-comment composite. `actions: read` lets the
  # await-prod-deploy gate query this commit's deploy run.
  contents: read
  pull-requests: write
  actions: read

defaults:
  run:
    shell: bash

jobs:
  # Changed-files recursion gate. See cms-publish-loop-host.yml for the
  # full rationale.
  recursion-gate:
    runs-on: ubuntu-latest
    outputs:
      run: ${{ steps.gate.outputs.run }}
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.2 (2026-01-09)
        with:
          fetch-depth: 2

      - name: Checkout platform (e2e harness + composite actions)
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.2 (2026-01-09)
        with:
          repository: ${{ inputs.platform_repo }}
          ref: ${{ inputs.platform_ref }}
          path: .cms-platform

      - name: Recursion gate
        id: gate
        uses: ./.cms-platform/.github/actions/cms-recursion-gate
        with:
          loop: media

  media-roundtrip:
    needs: [recursion-gate]
    runs-on: ubuntu-latest
    concurrency:
      # SHARED lane for ALL real-prod-mutating loop workflows
      # (cms-publish-loop-prod / cms-media-roundtrip / cms-publish-loop-host).
      # Declared on the HEAVY LOOP JOB, not the workflow: the cheap
      # recursion-gate job has no concurrency, so it runs OUTSIDE this lane
      # — its skip decision is computed immediately even while a real loop
      # holds the lane, and a recursion-skipped loop is `if:`-skipped before
      # it ever enters the lane (zero lane occupancy for recursion). GHA
      # keys concurrency groups by string ACROSS workflows, so one constant
      # group on these three loop jobs keeps them mutually exclusive: only
      # one real-prod loop runs at a time, whatever the trigger (push /
      # workflow_dispatch / host's daily cron all converge here). They each
      # mutate prod through Decap → cms-PR → auto-merge → deploy-production
      # and a parallel pair races deploy-production's `group: production`,
      # blowing each other's URL-reflect budgets. cancel-in-progress:false
      # queues rather than killing an in-flight loop (cancelling mid-flow
      # can leave the canary dirty); a stuck run holds the lane up to its
      # timeout-minutes, which is bounded and far cheaper than the collision.
      # This block MUST stay byte-identical across all three workflows AND
      # remain on the loop job (NOT the workflow) — enforced by
      # e2e/workflow-prod-loop-serialized.test.js.
      group: prod-mutating-loop
      cancel-in-progress: false
    env:
      # Site identity for the parameterized e2e helpers — supplied by
      # repo VARS so a consuming deployment passes its own deployed URLs.
      CMS_PROD_URL: ${{ vars.CMS_PROD_URL }}
      CMS_APEX: ${{ vars.CMS_APEX }}
      CMS_REPO: ${{ github.repository }}
    # Recursion guard delegated to the `recursion-gate` job above.
    if: ${{ needs.recursion-gate.outputs.run == 'true' }}
    timeout-minutes: 110
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.2 (2026-01-09)

      - name: Checkout platform (e2e harness + composite actions)
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.2 (2026-01-09)
        with:
          repository: ${{ inputs.platform_repo }}
          ref: ${{ inputs.platform_ref }}
          path: .cms-platform

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0 (2026-04-20)
        with:
          node-version: "20"

      - name: Install harness deps
        working-directory: .cms-platform/e2e
        run: npm ci

      - name: Install Playwright browser + system deps
        working-directory: .cms-platform/e2e
        run: npx playwright install --with-deps chromium

      # Post-merge only: do NOT drive prod until THIS commit is live.
      # Skipped on workflow_dispatch/schedule and when playground mode is
      # off (the spec self-skips, so there is nothing to gate).
      - name: Await prod deploy of this merge
        if: ${{ github.event_name == 'push' && vars.PROD_PLAYGROUND_MODE == 'true' }}
        uses: ./.cms-platform/.github/actions/await-prod-deploy
        with:
          prod-url: ${{ vars.CMS_PROD_URL }}

      - name: Skip — playground mode disabled
        if: vars.PROD_PLAYGROUND_MODE != 'true'
        run: echo "::notice::PROD_PLAYGROUND_MODE is not 'true'; skipping media round-trip."

      - name: Run media round-trip spec
        if: vars.PROD_PLAYGROUND_MODE == 'true'
        working-directory: .cms-platform/e2e
        env:
          CMS_E2E_PAT: ${{ secrets.CMS_E2E_PAT }}
          TARGET: prod
          RUN_PROD_MUTATE_PLAYGROUND: "1"
        run: |
          set -o pipefail
          npx playwright test \
            cms-media-roundtrip.spec.js \
            --project=chromium-desktop-3k \
            --reporter=list \
            --max-failures=1 \
            --workers=1 \
            2>&1 | tee /tmp/media-roundtrip.log

      - name: Upload test results on failure
        if: ${{ (failure() || cancelled()) && vars.PROD_PLAYGROUND_MODE == 'true' }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1 (2026-04-10)
        with:
          name: media-roundtrip-results
          path: |
            .cms-platform/e2e/test-results/
            /tmp/media-roundtrip.log
          retention-days: 14

      - name: Post failure summary
        if: ${{ failure() && vars.PROD_PLAYGROUND_MODE == 'true' }}
        uses: ./.cms-platform/.github/actions/post-failure-comment
        with:
          mode: post
          log-file: /tmp/media-roundtrip.log
          marker: media-roundtrip-failure-summary
          title: media-roundtrip

      - name: Resolve failure summary on success
        if: ${{ success() && vars.PROD_PLAYGROUND_MODE == 'true' }}
        uses: ./.cms-platform/.github/actions/post-failure-comment
        with:
          mode: resolve
          marker: media-roundtrip-failure-summary
          title: media-roundtrip
