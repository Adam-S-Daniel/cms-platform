# Reusable preview-env publish-loop for platform sites.
#
# A consuming site calls this from a thin wrapper that owns the
# workflow_dispatch trigger + run-name (see
# examples/site/.github/workflows/cms-publish-loop-preview.yml). The e2e
# harness + the post-failure-comment composite live in the PLATFORM
# repo, so this workflow checks the platform out into `.cms-platform/`
# and runs the suite from there. Site identity (apex) is an input wired
# to CMS_APEX; the spec builds the preview-pr<N>.<apex> host from it.
#
# Exercises the publish chain (Decap save → cms/<col>/<slug> PR →
# label-driven auto-merge → deploy → public URL) against a per-PR
# preview environment, targeting the parent PR's head ref.
#
# PLATFORM PORT NOTES (vs adamdaniel.ai@origin/main): the GHCR
# build-image job + `container:` block were DROPPED for inline deps; the
# `if: ${{ false }}` disable (an adamdaniel-only operational incident —
# an external dispatcher firing the preview loops) was NOT carried over;
# the stuck-PR diagnostic steps were DROPPED (un-ported sweep tooling).
#
# Spec gating: e2e/cms-publish-loop-preview.spec.js self-skips when
# CMS_E2E_PAT, PR_NUMBER, or PR_HEAD_REF are unset.
name: CMS Publish Loop — Preview Env (reusable)

on:
  workflow_call:
    inputs:
      pr_number:
        description: "Parent PR number (the preview env to target). Must be open with a working preview-pr<N>.<apex>."
        required: true
        type: string
      apex:
        description: "Site apex domain, e.g. example.com (no scheme); wired to CMS_APEX."
        required: false
        type: string
        default: ""
      platform_repo:
        description: "owner/name of the platform repo holding the e2e harness + composite action."
        required: false
        type: string
        default: Adam-S-Daniel/cms-platform
      platform_ref:
        description: "Tag/sha of the platform repo to fetch the harness from (pin to the same ref as this workflow)."
        required: false
        type: string
        default: main
    secrets:
      CMS_E2E_PAT:
        required: false

permissions:
  # Spec drives Decap with CMS_E2E_PAT for content writes; the workflow
  # itself only needs contents:read. `pull-requests: write` is for the
  # post-failure-comment composite (resolves via the `pr_number` input).
  contents: read
  pull-requests: write

defaults:
  run:
    shell: bash

jobs:
  preview-loop:
    runs-on: ubuntu-latest
    concurrency:
      # SHARED lane across ALL THREE preview-env workflows
      # (cms-publish-loop-preview / cms-preview-loops /
      # cms-delete-published-preview) — they all mutate the SAME per-PR
      # preview environment (preview-pr<N>.<apex>). Within one workflow the
      # specs already serialize via `--workers=1`, but there was no
      # CROSS-workflow guard: a consumer dispatching two or three of these
      # simultaneously against the same PR queued deploy-previews multiple
      # deep and blew each spec's URL-reflect wait budget — the root cause
      # of every June 2026 failure of these workflows in adamdaniel.ai
      # (solo dispatches always passed). GHA keys concurrency groups by
      # string ACROSS workflows, so one constant group (parameterized by
      # repo + PR number) on the loop job of each workflow keeps them
      # mutually exclusive per PR. cancel-in-progress:false queues rather
      # than killing an in-flight run (cancelling mid-flow can leave the
      # preview env / canary dirty); a stuck run holds the lane up to its
      # timeout-minutes, which is bounded and far cheaper than the
      # collision. This group key MUST stay identical across all three
      # workflows.
      group: preview-env-${{ github.repository }}-pr${{ inputs.pr_number }}
      cancel-in-progress: false
    env:
      CMS_APEX: ${{ inputs.apex }}
      CMS_REPO: ${{ github.repository }}
    # #1723 Cat 1 port (2026-07): the spec's TEST_TIMEOUT_MS was raised
    # from 12 to 90 min — see the spec file for the run evidence (adamdaniel
    # runs 28755547169 / 28757192011, both timed out at exactly 720,000ms)
    # and the per-leg budget math (baseline confirm + PR-open wait + the
    # new merge-aware wait + URL-reflect wait, x2 legs). 100 min gives the
    # same ~10-min runner-bring-up headroom as the prod sibling
    # (cms-publish-loop-prod.yml: timeout-minutes 90 vs spec TEST_TIMEOUT_MS
    # 80 min).
    timeout-minutes: 100
    steps:
      - name: Checkout site
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v6.0.2 (2026-01-09)

      - name: Checkout platform (e2e harness + composite action)
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v6.0.2 (2026-01-09)
        with:
          repository: ${{ inputs.platform_repo }}
          ref: ${{ inputs.platform_ref }}
          path: .cms-platform

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0 (2026-04-20)
        with:
          node-version: "20"

      - name: Install harness deps
        working-directory: .cms-platform/e2e
        run: npm ci

      - name: Install Playwright browser + system deps
        working-directory: .cms-platform/e2e
        run: npx playwright install --with-deps chromium

      - name: Resolve PR head ref
        id: pr
        # Look up the head ref + verify the PR is open before running.
        # Uses actions/github-script (not `gh api`) so it works whatever
        # the runner image ships.
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3  # v9.0.0 (2026-04-09)
        env:
          PR_NUMBER_INPUT: ${{ inputs.pr_number }}
        with:
          script: |
            const prNumber = parseInt(process.env.PR_NUMBER_INPUT, 10);
            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
            });
            if (pr.state !== "open") {
              core.setFailed(
                `PR #${prNumber} is not open (state=${pr.state}). The preview env may already be torn down.`,
              );
              return;
            }
            if (!pr.head || !pr.head.ref) {
              core.setFailed(`Could not resolve head ref for PR #${prNumber}.`);
              return;
            }
            core.setOutput("head_ref", pr.head.ref);
            core.notice(`Resolved PR #${prNumber} → head_ref=${pr.head.ref}`);

      # Self-heal: BEFORE the spec injects a fresh `e2e-publish-loop:`
      # marker, reset any canary still carrying an orphaned marker from a
      # PRIOR interrupted run on THIS PR head branch back to its canonical
      # baseline. The preview loop targets the PR head feature branch (not
      # main), so the reset is a direct Contents-API PUT on that branch —
      # the same write path cms-publish-loop-preview.spec.js uses — keyed
      # by CANARY_RESET_BRANCH. A leftover marker here has no required-
      # check blast radius (the branch dies with the PR), but clearing it
      # keeps the next run's forward leg from tripping on stale body
      # content. Idempotent + FAIL-OPEN: a clean branch / missing PAT /
      # API hiccup is a no-op and never breaks the loop.
      - name: Self-heal orphaned canary markers
        env:
          CMS_E2E_PAT: ${{ secrets.CMS_E2E_PAT }}
          CANARY_RESET_BRANCH: ${{ steps.pr.outputs.head_ref }}
        run: ./.cms-platform/scripts/reset-orphaned-canary.sh

      - name: Run preview-env publish-loop spec
        working-directory: .cms-platform/e2e
        env:
          # SITE_ROOT — the CONSUMING site's checkout (github.workspace). The e2e
          # harness runs from .cms-platform/e2e here, so the base_collections guards'
          # default (resolve __dirname/..) would point at the PLATFORM, not the
          # consumer; set it so keepsBaseCollection() reads the consumer's _config.yml
          # and a single-page bio (base_collections:[]) correctly SKIPS the collection
          # specs instead of timing out on a Posts sidebar link that never renders.
          SITE_ROOT: ${{ github.workspace }}
          CMS_E2E_PAT: ${{ secrets.CMS_E2E_PAT }}
          # TARGET=prod skips the local Jekyll webServer — the spec hits
          # the preview env's public URL directly.
          TARGET: prod
          PR_NUMBER: ${{ inputs.pr_number }}
          PR_HEAD_REF: ${{ steps.pr.outputs.head_ref }}
        run: |
          set -o pipefail
          npx playwright test \
            cms-publish-loop-preview.spec.js \
            --project=chromium-desktop-3k \
            --reporter=list \
            --max-failures=1 \
            2>&1 | tee /tmp/preview-loop.log

      - name: Upload test results on failure
        if: ${{ failure() || cancelled() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1 (2026-04-10)
        with:
          name: preview-loop-results
          path: |
            /tmp/preview-loop.log
            .cms-platform/e2e/test-results/**
          if-no-files-found: ignore
          retention-days: 14

      # Surface the failure block as a PR comment on the parent PR. This
      # workflow has no `pull_request` event, so pass `pr-number`
      # explicitly and don't gate on `github.event_name`.
      - name: Post failure summary
        if: failure()
        uses: ./.cms-platform/.github/actions/post-failure-comment
        with:
          mode: post
          log-file: /tmp/preview-loop.log
          marker: preview-loop-failure-summary
          title: preview-loop
          pr-number: ${{ inputs.pr_number }}

      - name: Resolve failure summary on success
        if: success()
        uses: ./.cms-platform/.github/actions/post-failure-comment
        with:
          mode: resolve
          marker: preview-loop-failure-summary
          title: preview-loop
          pr-number: ${{ inputs.pr_number }}
