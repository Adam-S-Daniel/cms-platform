# Reusable down-sync of the platform's canonical skills into a consuming site.
# A site calls this on a schedule (or dispatch); it opens a PR when the site's
# skills drift from the platform at the pinned ref. Platform-authoritative:
# the destination is rsync --delete'd to match the platform exactly.
name: Skills sync (reusable)

on:
  workflow_call:
    inputs:
      platform_repo:
        type: string
        default: Adam-S-Daniel/cms-platform
      platform_ref:
        type: string
        default: main
      dest:
        description: "Where the site keeps its skills (Claude Code default)."
        type: string
        default: .claude/skills
    secrets:
      gh_token:
        description: "Optional PAT so the sync PR can trigger CI; falls back to GITHUB_TOKEN."
        required: false

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.2 (2026-01-09)
      - name: Fetch platform skills
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.2 (2026-01-09)
        with:
          repository: ${{ inputs.platform_repo }}
          ref: ${{ inputs.platform_ref }}
          path: .cms-platform
      - name: Sync skills and open a PR if changed
        env:
          GH_TOKEN: ${{ secrets.gh_token || github.token }}
          DEST: ${{ inputs.dest }}
          REF: ${{ inputs.platform_ref }}
          PLATFORM: ${{ inputs.platform_repo }}
        run: |
          set -euo pipefail
          mkdir -p "$DEST"
          rsync -a --delete .cms-platform/skills/ "$DEST"/
          rm -rf .cms-platform
          if git diff --quiet -- "$DEST"; then
            echo "skills already in sync with ${PLATFORM}@${REF}"; exit 0
          fi
          BRANCH="platform/skills-sync"
          git config user.name  "cms-platform-bot"
          git config user.email "cms-platform-bot@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add "$DEST"
          git commit -m "chore: sync ${DEST} from ${PLATFORM}@${REF}"
          git push -f origin "$BRANCH"
          gh pr create --base "$GITHUB_REF_NAME" --head "$BRANCH" \
            --title "Sync skills from ${PLATFORM}@${REF}" \
            --body "Automated skills sync from \`${PLATFORM}@${REF}\`. Platform-authoritative (rsync --delete)." \
          || gh pr edit "$BRANCH" --title "Sync skills from ${PLATFORM}@${REF}" \
            --body "Automated skills sync from \`${PLATFORM}@${REF}\`."
