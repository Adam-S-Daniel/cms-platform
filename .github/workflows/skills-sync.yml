# Reusable down-sync of the platform's canonical skills into a consuming site.
# A site calls this on a schedule (or dispatch); it opens a PR when the site's
# skills drift from the platform at the pinned ref. Platform-authoritative:
# the destination is rsync --delete'd to match the platform exactly, EXCEPT for
# repo-local skills — a skill directory the site owns and marks with a
# `.repo-local` file is never overwritten or deleted (see skills/README.md).
# This keeps platform deletions propagating (what --delete buys) while letting a
# site keep its own skills; a plain "merge" would silently lose the former.
# Opt-in by destination presence (issue #83): a consumer that keeps no local
# skills mirror (no entry at `dest`) opts out — this is a no-op for it and we
# never force a mirror into existence. The canonical workflow stays present on
# every consumer (workflow-set parity); only its BEHAVIOR is data-driven.
# To OPT IN, a new consumer commits a tracked entry under `dest` first (e.g.
# `.claude/skills/.gitkeep`) — git doesn't track empty dirs, so an unseeded
# `dest` reads as absent and the sync stays a no-op until it is seeded.
name: Skills sync (reusable)

on:
  workflow_call:
    inputs:
      platform_repo:
        type: string
        default: Adam-S-Daniel/cms-platform
      platform_ref:
        type: string
        default: main
      dest:
        description: "Where the site keeps its skills (Claude Code default)."
        type: string
        default: .claude/skills
    secrets:
      gh_token:
        description: "Optional PAT so the sync PR can trigger CI; falls back to GITHUB_TOKEN."
        required: false

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v6.0.2 (2026-01-09)
      - name: Fetch platform skills
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v6.0.2 (2026-01-09)
        with:
          repository: ${{ inputs.platform_repo }}
          ref: ${{ inputs.platform_ref }}
          path: .cms-platform
      - name: Sync skills and open a PR if changed
        env:
          GH_TOKEN: ${{ secrets.gh_token || github.token }}
          DEST: ${{ inputs.dest }}
          REF: ${{ inputs.platform_ref }}
          PLATFORM: ${{ inputs.platform_repo }}
        run: |
          set -euo pipefail
          # Opt-out by absence: if the consumer keeps no skills mirror (nothing
          # at DEST — not a dir, file, or even a symlink), do NOT create one.
          # Skip cleanly so a no-skills consumer (e.g. jodidaniel) stops getting
          # a force-created `.claude/skills` + a noise "Sync skills" PR, and so
          # adamdaniel#2007-P7 can drop its mirror durably. (issue #83)
          if [ ! -e "$DEST" ] && [ ! -L "$DEST" ]; then
            echo "consumer keeps no '$DEST' mirror — skills-sync is a no-op here (issue #83)"
            rm -rf .cms-platform
            exit 0
          fi
          mkdir -p "$DEST"
          # Repo-local carve-out: a site owns a skill by dropping a `.repo-local`
          # marker file in that skill's directory. Such a skill is excluded from
          # the transfer (never overwritten) AND from --delete (never removed) —
          # rsync's --exclude protects matching paths from deletion unless
          # --delete-excluded is given, which it is NOT. Everything unmarked stays
          # platform-authoritative, so a skill removed from the platform is still
          # deleted here. Excludes are anchored at the skills-dir root ("/name/")
          # since skills are flat, one directory per skill.
          excludes=()
          while IFS= read -r -d '' marker; do
            name="$(basename "$(dirname "$marker")")"
            excludes+=( "--exclude=/${name}/" )
            echo "repo-local skill preserved: ${name}"
          done < <(find "$DEST" -mindepth 2 -maxdepth 2 -name .repo-local -print0)
          rsync -a --delete ${excludes[@]+"${excludes[@]}"} .cms-platform/skills/ "$DEST"/
          rm -rf .cms-platform
          if git diff --quiet -- "$DEST"; then
            echo "skills already in sync with ${PLATFORM}@${REF}"; exit 0
          fi
          BRANCH="platform/skills-sync"
          git config user.name  "cms-platform-bot"
          git config user.email "cms-platform-bot@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add "$DEST"
          git commit -m "chore: sync ${DEST} from ${PLATFORM}@${REF}"
          git push -f origin "$BRANCH"
          gh pr create --base "$GITHUB_REF_NAME" --head "$BRANCH" \
            --title "Sync skills from ${PLATFORM}@${REF}" \
            --body "Automated skills sync from \`${PLATFORM}@${REF}\`. Platform-authoritative (rsync --delete); skills marked \`.repo-local\` are preserved." \
          || gh pr edit "$BRANCH" --title "Sync skills from ${PLATFORM}@${REF}" \
            --body "Automated skills sync from \`${PLATFORM}@${REF}\`."
