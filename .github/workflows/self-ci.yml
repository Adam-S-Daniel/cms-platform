# Self-CI — the platform lints ITSELF.
#
# WHY THIS EXISTS
# Every other workflow in this repo is an `on: workflow_call` reusable, so a
# pull_request against cms-platform runs ZERO checks of its own (the v0.1.1 PR
# had none — a workflow YAML typo, a broken theme filter, or a regressed
# harness lint could merge unnoticed). This workflow runs the platform's own
# LIGHT, high-value self-checks directly on `pull_request` + `push` to main so
# the machinery repo has a real merge gate without standing up a full
# Playwright browser matrix or any AWS credentials.
#
# WHAT IT RUNS (all fast — target < a few minutes)
#   1. actionlint over .github/workflows/*.yml        (hard-fail)
#   2. theme-gem ruby unit specs: theme/spec/*_test.rb (hard-fail)
#   3. node pure-fs harness lints: e2e/*.test.js that need no browser/build
#                                                      (hard-fail)
#   4. cfn-lint over the CloudFormation templates      (advisory, soft-fail)
#
# NOT RUN HERE (needs a browser / a built Jekyll site / AWS — covered by the
# e2e reusable + dogfood/consumer CI, not by a unit-speed PR gate):
#   - the Playwright browser matrix (`*.spec.js`)
#   - the build-dependent harness lints (canary-content / canary-ondemand-
#     noindex / e2e-posts-public-exclusion / prod-mutate-fixture — they read a
#     `bundle exec jekyll build` `_site` or the `_e2e/` content fixtures;
#     base-collections-skip-meta — it BUILDS both fixture-site variants and
#     subprocess-runs the #33-guarded specs against each; its build-FREE
#     counterpart base-collections-guard-registry.test.js DOES run here and is
#     the real PR gate on the #33 admin-write skip-guards) and
#     `playwright-image-drift` (reads a root package-lock.json + ci-runner
#     Dockerfile this machinery repo intentionally doesn't ship — see AGENTS.md
#     "playwright-image-drift real-repo subtest caveat").
#   - `aws cloudformation validate-template` (no creds in CI) — cfn-lint is the
#     credential-free stand-in, and is advisory so a cfn-lint version bump or a
#     spec-coverage gap can't block an unrelated PR.

name: Self CI

# Dynamic per-run title (issue #1776 grammar; enforced by
# e2e/workflow-run-name.test.js — which this very workflow runs). Two events,
# so the run-name branches on `github.event_name`.
run-name: >-
  ${{ github.event_name == 'pull_request'
        && format('PR #{0} — {1}', github.event.pull_request.number, github.event.pull_request.title)
   || format('push — {0} @{1}', github.ref_name, github.actor) }}

on:
  pull_request:
  push:
    branches: [main]

# Least privilege: every job here only reads the checked-out tree. Nothing
# posts comments, pushes, or touches deployments.
permissions:
  contents: read

concurrency:
  # One in-flight run per PR (or per branch on push); supersede stale runs.
  group: self-ci-${{ github.event_name }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  # ── 1. actionlint — static analysis of every workflow YAML ───────────────
  # Downloads the pinned actionlint BINARY directly (the repo's gitleaks
  # pattern in secrets-scan.yml) rather than a marketplace action: one fewer
  # third-party action in the supply chain, and the version is pinned + dated
  # right here. Hard-fails on any finding — a malformed workflow is a real bug.
  actionlint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v6.0.2 (2026-01-09)

      - name: Install actionlint
        env:
          # Pin the binary so behaviour is reproducible across runs. Bump
          # deliberately (7-day cooling-off, per AGENTS.md / pin-actions policy).
          ACTIONLINT_VERSION: '1.7.7'  # 2025-05-30
        run: |
          set -euo pipefail
          tarball="actionlint_${ACTIONLINT_VERSION}_linux_amd64.tar.gz"
          url="https://github.com/rhysd/actionlint/releases/download/v${ACTIONLINT_VERSION}/${tarball}"
          curl -fsSL --retry 3 "$url" -o /tmp/actionlint.tgz
          tar -xzf /tmp/actionlint.tgz -C /tmp actionlint
          sudo install -m 0755 /tmp/actionlint /usr/local/bin/actionlint
          actionlint --version

      - name: Lint workflows
        # `-color` keeps the annotations readable in the run log. actionlint
        # exits non-zero on any finding, which fails the job.
        run: actionlint -color

  # ── 2. theme-gem ruby unit specs ─────────────────────────────────────────
  # Plain-ruby tests (no rspec/minitest, no bundle) — each `ruby <file>` exits
  # non-zero on a failed assertion. These guard the Liquid filters + Jekyll
  # generator plugins the gem ships (cachebust, auto_tag_pages, tag_feeds,
  # exclude_e2e_posts). Hard-fail.
  ruby-theme-specs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v6.0.2 (2026-01-09)

      - name: Setup Ruby
        uses: ruby/setup-ruby@0dafeac902942906541bc140009cdbf32665b601  # v1.310.0 (2026-05-20)
        with:
          # The specs stub the Liquid/Jekyll hooks they need and only use the
          # stdlib (fileutils/tmpdir), so no `bundle install` is required —
          # keeping this lane to a few seconds.
          ruby-version: '3.2'

      - name: Run theme specs
        run: |
          set -euo pipefail
          shopt -s nullglob
          specs=(theme/spec/*_test.rb)
          if [ ${#specs[@]} -eq 0 ]; then
            echo "No theme specs found under theme/spec/*_test.rb" >&2
            exit 1
          fi
          status=0
          for spec in "${specs[@]}"; do
            echo "::group::ruby ${spec}"
            ruby "${spec}" || status=1
            echo "::endgroup::"
          done
          exit "${status}"

  # ── 3. node pure-fs harness lints ────────────────────────────────────────
  # The e2e harness's `*.test.js` files are Playwright-runner tests that are
  # pure-fs LINTS — they assert against the workflow YAML, admin JS, scripts,
  # and harness internals and never call page.goto / launch a browser. Running
  # them with TARGET=prod makes playwright.config.js skip the local Jekyll +
  # decap-server webServer bring-up entirely (it's `local`-only), and pinning a
  # single project (`chromium-light`) runs each lint once without launching any
  # browser. `npm ci` with PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD=1 installs the test
  # runner but no ~100MB browser binaries. Hard-fail.
  node-unit-lints:
    runs-on: ubuntu-latest
    env:
      # No browser, no built site, no network — the lint specs are pure-fs.
      TARGET: prod
      PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: '1'
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v6.0.2 (2026-01-09)

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0 (2026-04-20)
        with:
          node-version: '20'

      - name: Install harness deps (no browser binaries)
        working-directory: e2e
        run: npm ci

      - name: Run pure-fs harness lints
        working-directory: e2e
        # Explicit DENY list of the build-/repo-dependent specs (they need a
        # `jekyll build` _site, the `_e2e/` content fixtures, or a root
        # package-lock.json + ci-runner Dockerfile the machinery repo doesn't
        # ship — see AGENTS.md). Everything else under e2e/*.test.js is a
        # hermetic pure-fs lint. Building the allowlist by exclusion means a
        # newly-added pure-fs lint is picked up automatically; a new build-
        # dependent one is the only thing that ever needs adding to DENY.
        run: |
          set -euo pipefail
          shopt -s nullglob
          deny='canary-content.test.js|canary-ondemand-noindex.test.js|e2e-posts-public-exclusion.test.js|playwright-image-drift.test.js|prod-mutate-fixture.test.js|base-collections-skip-meta.test.js'
          specs=()
          for f in ./*.test.js; do
            base=${f#./}
            if [[ ! "${base}" =~ ^(${deny})$ ]]; then
              specs+=("${base}")
            fi
          done
          if [ ${#specs[@]} -eq 0 ]; then
            echo "No pure-fs *.test.js lints matched" >&2
            exit 1
          fi
          echo "Running ${#specs[@]} pure-fs lint spec file(s)."
          npx playwright test --project=chromium-light --reporter=line "${specs[@]}"

  # ── 4. cfn-lint — CloudFormation templates (advisory) ────────────────────
  # `aws cloudformation validate-template` needs AWS credentials we don't have
  # in CI, so cfn-lint is the credential-free stand-in. Marked
  # continue-on-error: a cfn-lint version bump or a new rule shouldn't block an
  # otherwise-good PR — but its findings still surface in the run log so infra
  # drift is visible.
  cfn-lint:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v6.0.2 (2026-01-09)

      - name: Setup Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v5.6.0 (2025-03-23)
        with:
          python-version: '3.12'

      - name: Install cfn-lint
        run: pip install --disable-pip-version-check cfn-lint

      - name: Lint CloudFormation templates
        run: |
          set -euo pipefail
          shopt -s nullglob
          templates=(
            oauth-proxy/template.yaml
            infrastructure/rum/template.yaml
            infrastructure/bootstrap/template.yaml
          )
          present=()
          for t in "${templates[@]}"; do
            [ -f "$t" ] && present+=("$t")
          done
          if [ ${#present[@]} -eq 0 ]; then
            echo "No CloudFormation templates found — nothing to lint."
            exit 0
          fi
          cfn-lint "${present[@]}"
