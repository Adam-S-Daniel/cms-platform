# Scheduled-run health audit (reusable).
#
# THE PROBLEM (2026-07 workflow audit): scheduled workflows fail SILENTLY —
# an `event=schedule` failure has no PR to go red on and fires no
# notification, so it is invisible outside the Actions tab. Observed live:
# adamdaniel.ai's daily editorial-label-audit was red 24/30 days for three
# weeks unnoticed; jodidaniel.com's sweep-stale-cms-prs startup-failed 30/30
# for a month (a dropped `secrets:` map) before anyone looked.
#
# THE FIX: a daily audit that scans the CALLER repo's workflow runs from the
# last `window_hours` (default 48) for `event=schedule` conclusions of
# failure / startup_failure / timed_out and opens-or-updates a SINGLE
# tracking issue (label `ci`, found via a hidden marker): open on first
# failure (the issue notification is the alert), comment only NEW failing
# runs (dedupe by run id), auto-close after a clean window. Zero changes to
# the ~10 existing scheduled callers — they stay untouched; this watches
# them all from the outside. The 48h window is deliberate: GitHub throttles
# crons on these repos (daily crons measured 4-5h late), so two daily audit
# runs can be ~29h apart — a 24h window would leave a blind gap.
#
# The audit run itself stays GREEN when it successfully files/updates the
# alert (the ISSUE is the alert channel); it goes red only when it could not
# do its job (API/permission failure) — "red means the alerting layer needs
# a human", the same contract as editorial-label-audit's fix mode. The audit
# is itself scheduled, and its own failed runs are scheduled failures the
# NEXT day's run reports — the watcher is watched.
name: Scheduled-run health audit (reusable)

on:
  workflow_call:
    inputs:
      platform_repo: { type: string, default: Adam-S-Daniel/cms-platform }
      platform_ref:  { type: string, default: main }
      # Scan window in hours. String (not number) so thin callers can wire a
      # workflow_dispatch input straight through without type coercion.
      window_hours:  { type: string, default: "48" }
      issue_label:   { type: string, default: "ci" }
      dry_run:       { type: boolean, default: false }

# Reusable-workflow permissions are capped by the CALLER's grant: the caller
# must give actions: read (list workflow runs) + issues: write (open /
# comment / close the tracking issue) or the audit falls back to failing loud.
permissions:
  contents: read
  actions: read
  issues: write

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Fetch the audit script from the platform
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v6.0.2 (2026-01-09)
        with:
          repository: ${{ inputs.platform_repo }}
          ref: ${{ inputs.platform_ref }}
          sparse-checkout: scripts/audit-scheduled-runs.js
          sparse-checkout-cone-mode: false
          path: .cms-platform
      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0 (2026-04-20)
        with:
          node-version: "20"
      - name: Audit scheduled-run health
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Pass the caller's repo explicitly: the reusable only SPARSE-checks-out
          # the audit script (no consumer checkout), so github.workspace is not a
          # git repo and gh could not infer the repo from a local remote (the
          # editorial-label-audit v0.1.16 trap).
          node .cms-platform/scripts/audit-scheduled-runs.js \
            --repo "${{ github.repository }}" \
            --window-hours "${{ inputs.window_hours }}" \
            --label "${{ inputs.issue_label }}" \
            ${{ inputs.dry_run && '--dry-run' || '' }}
