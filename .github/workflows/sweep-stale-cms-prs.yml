name: Sweep stale automated-test PRs
on:
  workflow_call:
    inputs:
      dry_run:
        description: 'List candidates without closing'
        type: boolean
        default: false
      threshold_hours:
        description: 'Min PR age in hours before sweeping'
        type: number
        default: 6
permissions:
  contents: write
  pull-requests: write

concurrency:
  group: sweep-stale-cms-prs
  cancel-in-progress: false

jobs:
  sweep:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Sweep stale Decap-managed PRs
        env:
          GH_TOKEN: ${{ secrets.CMS_E2E_PAT }}
          # `gh` defaults to the current git repo; without a checkout
          # step the runner has no .git, so we set GH_REPO explicitly
          # so every `gh pr ...` call resolves to this repo without
          # needing actions/checkout for what is purely an API job.
          GH_REPO: ${{ github.repository }}
          DRY_RUN: ${{ inputs.dry_run || 'false' }}
          THRESHOLD_HOURS: ${{ inputs.threshold_hours || 6 }}
        run: |
          set -euo pipefail

          # Branch prefixes that are ONLY ever generated by the
          # automated test harness. No human-author code path produces
          # any of these.
          TEST_ONLY_PATTERNS=(
            'cms/e2e/'
            'cms/e2e-fixture/'
          )

          THRESHOLD_TS=$(date -u -d "${THRESHOLD_HOURS} hours ago" +%s)
          echo "::notice::Sweep — automated-test PRs > ${THRESHOLD_HOURS}h. DRY_RUN=${DRY_RUN}"

          for pattern in "${TEST_ONLY_PATTERNS[@]}"; do
            # `gh pr list` defaults to `--limit 30` and silently
            # truncates above that. `--paginate` is NOT a flag here
            # (gh-api-only); use `--limit <high>` to widen the page.
            # 1000 is comfortable headroom — at steady state we
            # expect <30 stale PRs per prefix, but a multi-day
            # outage of this sweep can easily push past 30.
            gh pr list \
              --state open \
              --search "head:${pattern}" \
              --limit 1000 \
              --json number,headRefName,createdAt,labels,title \
              --jq '.[]' | while read -r pr_json; do
              num=$(echo "$pr_json" | jq -r '.number')
              branch=$(echo "$pr_json" | jq -r '.headRefName')
              created=$(echo "$pr_json" | jq -r '.createdAt')
              created_ts=$(date -u -d "$created" +%s)
              has_keep=$(echo "$pr_json" | jq -r '[.labels[].name] | contains(["keep"])')

              # Belt-and-braces: re-verify the branch prefix client-
              # side. `gh pr list --search head:<prefix>` is normally
              # exact, but a future GitHub search-syntax change could
              # widen it; this guard ensures we never close a PR off
              # one of the three sanctioned prefixes.
              prefix_ok=false
              for p in "${TEST_ONLY_PATTERNS[@]}"; do
                case "$branch" in
                  "$p"*) prefix_ok=true; break;;
                esac
              done
              if [ "$prefix_ok" != "true" ]; then
                echo "::warning::skip #${num} [${branch}] — branch prefix not in TEST_ONLY_PATTERNS (search returned an unexpected result)"
                continue
              fi

              if [ "$has_keep" = "true" ]; then
                echo "skip #${num} [${branch}] — has 'keep' label"
                continue
              fi

              if [ "$created_ts" -ge "$THRESHOLD_TS" ]; then
                echo "skip #${num} [${branch}] — only $(( ($(date -u +%s) - created_ts) / 60 )) min old"
                continue
              fi

              age_h=$(( ($(date -u +%s) - created_ts) / 3600 ))
              echo "close #${num} [${branch}] — ${age_h}h old"
              if [ "$DRY_RUN" != "true" ]; then
                gh pr close "$num" --delete-branch --comment \
                  "Closed by sweep-stale-cms-prs.yml — automated-test PR open for ${age_h}h, longer than the ${THRESHOLD_HOURS}h threshold. Add the \`keep\` label and reopen if this was deliberate." \
                  || echo "::warning::failed to close #${num} (might already be closed or merged)"
              fi
            done
          done

          # ── Tier 2: PRs labelled `automated-test` ───────────────
          # Catches PRs on branches that DO have a legitimate human
          # use case (e.g., `cms/posts/<slug>` for real editor drafts)
          # but are unambiguously test-driven because the
          # `automated-test` label was applied at creation by
          # `e2e/github-actions-poll.js#waitForCmsPullRequest`.
          # Without this tier, abandoned prod-mutate PRs (PR #305 was
          # exactly this: cms/posts/2099-01-01-e2e-mutation-canary,
          # auto-merge enabled, e2e checks failed, PR sat 30+ min)
          # require manual cleanup; with it the daily sweep handles
          # them. Branch is NOT auto-deleted in this tier — Decap
          # reuses `cms/<col>/<slug>` per entry, and the next test
          # run's `closeStaleDecapPrOnBranch` is responsible for the
          # branch-delete handoff.
          echo "::notice::Tier 2 — sweeping automated-test labelled PRs > ${THRESHOLD_HOURS}h"
          # Same `--limit` rationale as Tier 1: default 30 is the
          # silent-truncation trap. Widen to 1000.
          gh pr list \
            --state open \
            --label automated-test \
            --limit 1000 \
            --json number,headRefName,createdAt,labels,title \
            --jq '.[]' | while read -r pr_json; do
            num=$(echo "$pr_json" | jq -r '.number')
            branch=$(echo "$pr_json" | jq -r '.headRefName')
            created=$(echo "$pr_json" | jq -r '.createdAt')
            created_ts=$(date -u -d "$created" +%s)
            has_keep=$(echo "$pr_json" | jq -r '[.labels[].name] | contains(["keep"])')

            if [ "$has_keep" = "true" ]; then
              echo "skip #${num} [${branch}] — has 'keep' label"
              continue
            fi

            if [ "$created_ts" -ge "$THRESHOLD_TS" ]; then
              echo "skip #${num} [${branch}] — only $(( ($(date -u +%s) - created_ts) / 60 )) min old"
              continue
            fi

            age_h=$(( ($(date -u +%s) - created_ts) / 3600 ))
            echo "close #${num} [${branch}] — ${age_h}h old (automated-test labelled)"
            if [ "$DRY_RUN" != "true" ]; then
              gh pr close "$num" --comment \
                "Closed by sweep-stale-cms-prs.yml — \`automated-test\`-labelled PR open for ${age_h}h, longer than the ${THRESHOLD_HOURS}h threshold. Add the \`keep\` label and reopen if this was deliberate." \
                || echo "::warning::failed to close #${num} (might already be closed or merged)"
            fi
          done

          # ── Tier 3: orphaned BRANCHES with no open PR ───────────
          # A crashed run can push a branch and die before opening a
          # PR; or a PR can be closed without `--delete-branch`. Either
          # way, the branch lingers on origin forever. Tier 1 / Tier 2
          # only handle branches that still have an OPEN PR — anything
          # else falls through to here.
          #
          # Same prefix safelist as Tier 1 (`cms/e2e/`,
          # `cms/e2e-fixture/`) — DO NOT broaden. Other `cms/<col>/`
          # prefixes can host real editor drafts and `claude/...` is
          # used by human + agent authors.
          #
          # Per-branch opt-out: because Tier 3 by definition operates
          # on branches with NO open PR, the `keep` LABEL doesn't
          # apply. Instead, include `[sweep-keep]` anywhere in the tip
          # commit message to hold an orphan for debugging.
          echo "::notice::Tier 3 — sweeping orphaned branches > ${THRESHOLD_HOURS}h with no open PR"
          for pattern in "${TEST_ONLY_PATTERNS[@]}"; do
            # Paginate: branches list is capped at 100/page, and at
            # steady state we may accumulate hundreds of orphans.
            gh api --paginate "repos/${GH_REPO}/branches?per_page=100" \
              --jq ".[] | select(.name | startswith(\"${pattern}\")) | .name" \
              | while read -r branch; do
              [ -z "$branch" ] && continue

              # Belt-and-braces: re-verify prefix (mirrors Tier 1's
              # client-side guard). Never delete a branch whose name
              # doesn't start with one of the safelisted prefixes.
              prefix_ok=false
              for p in "${TEST_ONLY_PATTERNS[@]}"; do
                case "$branch" in
                  "$p"*) prefix_ok=true; break;;
                esac
              done
              if [ "$prefix_ok" != "true" ]; then
                echo "::warning::skip BRANCH ${branch} — prefix not in TEST_ONLY_PATTERNS (unexpected API result)"
                continue
              fi

              # Skip if any open PR points at this branch — Tier 1 / 2
              # already own that case and use --delete-branch.
              # `--limit 1` is sufficient: we only need existence,
              # not the full list. Cheaper API call too.
              open_count=$(gh pr list --state open --search "head:${branch}" --limit 1 --json number --jq 'length')
              if [ "$open_count" != "0" ]; then
                echo "skip BRANCH ${branch} — has open PR(s)"
                continue
              fi

              # Branch tip metadata: committer date + commit message
              # (for [sweep-keep] opt-out).
              branch_json=$(gh api "repos/${GH_REPO}/branches/${branch}" 2>/dev/null || echo '')
              if [ -z "$branch_json" ]; then
                echo "::warning::skip BRANCH ${branch} — failed to fetch metadata"
                continue
              fi
              tip_date=$(echo "$branch_json" | jq -r '.commit.commit.committer.date')
              tip_msg=$(echo "$branch_json" | jq -r '.commit.commit.message')
              tip_ts=$(date -u -d "$tip_date" +%s)

              if echo "$tip_msg" | grep -qF '[sweep-keep]'; then
                echo "skip BRANCH ${branch} — tip commit has [sweep-keep] marker"
                continue
              fi

              if [ "$tip_ts" -ge "$THRESHOLD_TS" ]; then
                echo "skip BRANCH ${branch} — only $(( ($(date -u +%s) - tip_ts) / 60 )) min old"
                continue
              fi

              age_h=$(( ($(date -u +%s) - tip_ts) / 3600 ))
              echo "delete BRANCH ${branch} — ${age_h}h old"
              if [ "$DRY_RUN" != "true" ]; then
                # Direct ref delete via API — works without a checkout.
                gh api -X DELETE "repos/${GH_REPO}/git/refs/heads/${branch}" \
                  || echo "::warning::failed to delete BRANCH ${branch} (might already be gone)"
              fi
            done
          done

          echo "::notice::Sweep complete. DRY_RUN=${DRY_RUN}"

      - name: Sweep stale `_e2e/canary-delete-*` fixtures left on main
        # The throw-away delete fixtures `_e2e/canary-delete-<runId>.md`
        # should be created and removed within a single test run. A
        # crashed run leaves them on main. Sweep any older than the
        # same threshold via a `cms/e2e-fixture/sweep-…` PR labelled
        # cms/ready. (No label gate here — these files are NEVER
        # human-authored; the canary collection's
        # `[E2E TEST FIXTURES — DO NOT EDIT]` label is the
        # convention.)
        # Boolean comparison: workflow_dispatch booleans come through
        # as the boolean literal `true`, not the string `'true'`. Use
        # `!inputs.dry_run` so the if matches when dry_run is unset
        # (cron) AND when it's explicitly false. The earlier
        # `!= 'true'` form silently let the step run on every dry-run
        # dispatch — run #25500298081 opened a real cleanup PR (#347)
        # that was supposed to be a dry-run preview only.
        if: ${{ !inputs.dry_run }}
        env:
          GH_TOKEN: ${{ secrets.CMS_E2E_PAT }}
          GH_REPO: ${{ github.repository }}
          THRESHOLD_HOURS: ${{ inputs.threshold_hours || 6 }}
        run: |
          set -euo pipefail
          THRESHOLD_TS=$(date -u -d "${THRESHOLD_HOURS} hours ago" +%s)

          files=$(gh api "/repos/${GH_REPO}/contents/_e2e?ref=main" --jq \
            '.[] | select(.name | startswith("canary-delete-")) | .path')

          if [ -z "$files" ]; then
            echo "::notice::No stale canary-delete-* fixtures on main."
            exit 0
          fi

          RUN_ID=$(date -u +%s)
          BRANCH="cms/e2e-fixture/sweep-canary-delete-${RUN_ID}"

          MAIN_SHA=$(gh api "/repos/${GH_REPO}/git/ref/heads/main" --jq '.object.sha')

          BRANCH_CREATED=false
          for path in $files; do
            last_commit=$(gh api "/repos/${GH_REPO}/commits?path=${path}&per_page=1" --jq '.[0].commit.committer.date')
            last_ts=$(date -u -d "$last_commit" +%s)
            if [ "$last_ts" -ge "$THRESHOLD_TS" ]; then
              echo "skip ${path} — $(( ($(date -u +%s) - last_ts) / 60 )) min old"
              continue
            fi
            age_h=$(( ($(date -u +%s) - last_ts) / 3600 ))
            echo "delete ${path} — ${age_h}h old"

            if [ "$BRANCH_CREATED" = "false" ]; then
              gh api "/repos/${GH_REPO}/git/refs" \
                -f "ref=refs/heads/${BRANCH}" \
                -f "sha=${MAIN_SHA}" >/dev/null
              BRANCH_CREATED=true
            fi

            sha=$(gh api "/repos/${GH_REPO}/contents/${path}?ref=${BRANCH}" --jq '.sha')
            gh api "/repos/${GH_REPO}/contents/${path}" \
              -X DELETE \
              -f "message=chore(sweep): remove stale ${path} (${age_h}h old)" \
              -f "sha=${sha}" \
              -f "branch=${BRANCH}" >/dev/null
          done

          if [ "$BRANCH_CREATED" = "true" ]; then
            PR_NUM=$(gh pr create \
              --title "chore(sweep): remove stale canary-delete-* fixtures" \
              --body "Automated cleanup by \`.github/workflows/sweep-stale-cms-prs.yml\`. The deleted files are throw-away fixtures from \`cms-delete-published.spec.js\` runs that crashed before the test could clean them up. Auto-merges via the \`cms/ready\` label." \
              --head "${BRANCH}" \
              --base main \
              --label "cms/ready" \
              --label "automated" | grep -oE '[0-9]+$')
            echo "::notice::Opened cleanup PR #${PR_NUM} on branch ${BRANCH}"
          fi

      - name: Sweep stale ephemeral prod-loop `_posts/` + upload orphans left on main
        # #1771 step 4 made the prod-mutate + media-roundtrip loops create
        # + delete EPHEMERAL born-published per-run posts
        # (`_posts/2099-12-31-e2e-prod-mutate-<runId>.md` /
        # `_posts/2099-12-31-e2e-media-roundtrip-<runId>.md`) plus a per-run
        # uploaded image (`assets/images/uploads/e2e-media-roundtrip-<runId>.png`).
        # A crashed run that died before its existence-only-delete afterAll
        # leaks at most ONE inert, uniquely-named orphan of each — never a
        # corrupt shared baseline. This tier mirrors the `_e2e/canary-delete-*`
        # sweep above: list the orphans older than the same threshold and
        # route them through a single `cms/e2e-fixture/sweep-…` PR labelled
        # `cms/ready` + `automated`, which auto-merges via the
        # editorial-workflow. (No label gate — these names are NEVER
        # human-authored; `test_fixture: true` + the unique prefixes are the
        # convention.) Same `!inputs.dry_run` boolean-comparison guard as the
        # canary-delete sweep (run #25500298081's false-positive lesson).
        if: ${{ !inputs.dry_run }}
        env:
          GH_TOKEN: ${{ secrets.CMS_E2E_PAT }}
          GH_REPO: ${{ github.repository }}
          THRESHOLD_HOURS: ${{ inputs.threshold_hours || 6 }}
        run: |
          set -euo pipefail
          THRESHOLD_TS=$(date -u -d "${THRESHOLD_HOURS} hours ago" +%s)

          # Ephemeral prod-loop posts: both per-run prefixes under _posts/.
          post_files=$(gh api "/repos/${GH_REPO}/contents/_posts?ref=main" --jq \
            '.[] | select(.name | startswith("2099-12-31-e2e-prod-mutate-") or startswith("2099-12-31-e2e-media-roundtrip-")) | .path')
          # Per-run media uploads from the media round-trip spec.
          upload_files=$(gh api "/repos/${GH_REPO}/contents/assets/images/uploads?ref=main" --jq \
            '.[] | select(.name | startswith("e2e-media-roundtrip-") and endswith(".png")) | .path')
          files=$(printf '%s\n%s\n' "$post_files" "$upload_files" | grep -v '^$' || true)

          if [ -z "$files" ]; then
            echo "::notice::No stale ephemeral prod-loop orphans on main."
            exit 0
          fi

          RUN_ID=$(date -u +%s)
          BRANCH="cms/e2e-fixture/sweep-prod-loop-${RUN_ID}"

          MAIN_SHA=$(gh api "/repos/${GH_REPO}/git/ref/heads/main" --jq '.object.sha')

          BRANCH_CREATED=false
          for path in $files; do
            last_commit=$(gh api "/repos/${GH_REPO}/commits?path=${path}&per_page=1" --jq '.[0].commit.committer.date')
            last_ts=$(date -u -d "$last_commit" +%s)
            if [ "$last_ts" -ge "$THRESHOLD_TS" ]; then
              echo "skip ${path} — $(( ($(date -u +%s) - last_ts) / 60 )) min old"
              continue
            fi
            age_h=$(( ($(date -u +%s) - last_ts) / 3600 ))
            echo "delete ${path} — ${age_h}h old"

            if [ "$BRANCH_CREATED" = "false" ]; then
              gh api "/repos/${GH_REPO}/git/refs" \
                -f "ref=refs/heads/${BRANCH}" \
                -f "sha=${MAIN_SHA}" >/dev/null
              BRANCH_CREATED=true
            fi

            sha=$(gh api "/repos/${GH_REPO}/contents/${path}?ref=${BRANCH}" --jq '.sha')
            gh api "/repos/${GH_REPO}/contents/${path}" \
              -X DELETE \
              -f "message=chore(sweep): remove stale ${path} (${age_h}h old)" \
              -f "sha=${sha}" \
              -f "branch=${BRANCH}" >/dev/null
          done

          if [ "$BRANCH_CREATED" = "true" ]; then
            PR_NUM=$(gh pr create \
              --title "chore(sweep): remove stale ephemeral prod-loop orphans" \
              --body "Automated cleanup by \`.github/workflows/sweep-stale-cms-prs.yml\`. The deleted files are throw-away ephemeral posts / uploads from \`cms-publish-loop-prod-mutate.spec.js\` / \`cms-media-roundtrip.spec.js\` (#1771 step 4) runs that crashed before their existence-only-delete cleanup could fire. Auto-merges via the \`cms/ready\` label." \
              --head "${BRANCH}" \
              --base main \
              --label "cms/ready" \
              --label "automated" | grep -oE '[0-9]+$')
            echo "::notice::Opened cleanup PR #${PR_NUM} on branch ${BRANCH}"
          fi
