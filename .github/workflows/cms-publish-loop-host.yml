name: CMS Publish Loop — Host Repo (canary collection)
run-name: >-
  ${{ github.event_name == 'schedule'
        && format('scheduled — {0}', github.event.schedule)
   || github.event_name == 'push'
        && format('push — {0} @{1}', github.ref_name, github.actor)
   || format('manual — @{0}', github.actor) }}

# Runs the full Decap → cms PR → auto-merge → deploy-production loop
# end-to-end against prod, mutating a `_e2e/` canary entry (default
# canary-post). Mirrors cms-publish-loop-prod.yml's structure but
# targets the canary collection instead of `_posts/`.
#
# PLATFORM PORT NOTES (vs adamdaniel.ai@origin/main):
#   - Runs in the PLATFORM repo (dogfooding): the e2e harness + the
#     recursion-churn module live here under e2e/, so no .cms-platform/
#     checkout is needed and the recursion-gate composite resolves the
#     churn module straight from the workspace.
#   - The site's deployed identity is parameterized via repo VARS
#     (CMS_PROD_URL / CMS_APEX) so a consuming deployment supplies its
#     own URLs; CMS_REPO falls back to github.repository.
#   - The GHCR prebaked `ci-runner` image + its `build-image` job and
#     the `container:` block were DROPPED — that is adamdaniel-only
#     infra (a Jekyll/Ruby image pushed to that repo's GHCR namespace).
#     Deps install inline (Node + npm ci + playwright install), the
#     same shape e2e-tests.yml uses. The shared prod-mutating-loop
#     concurrency lane, the await-prod-deploy gate, and the
#     recursion-gate job — the load-bearing invariants — are preserved.
#   - The stuck-PR diagnostic steps were DROPPED: they shell out to
#     scripts/diagnose-stuck-pr.js (+ auto-resolve-newline-conflict.js),
#     CMS-PR-sweep tooling that is not part of the e2e harness scope.
#
# Spec gating: e2e/cms-publish-loop.spec.js self-skips when
# `RUN_HOST_REPO_PUBLISH_LOOP=1` is unset, so the spec only runs inside
# this workflow.

on:
  schedule:
    # 12:00 UTC daily. All real-prod loops serialize through the shared
    # `prod-mutating-loop` concurrency group declared on each loop's
    # heavy job, so mutual exclusion is structural, not time-based.
    - cron: '0 12 * * *'
  push:
    branches: [main]
    paths:
      # Deliberately NO e2e/** entries. The spec/helper files this loop
      # runs are validated by the daily `schedule` run and on-demand
      # `workflow_dispatch` — both ignore `paths:` and always fire.
      - .github/workflows/cms-publish-loop-host.yml
      - admin/**
      - _e2e/canary-post.md
      - _e2e/canary-page.md
      - _e2e/canary-project.md
      - playwright.config.js
      - package.json
      - package-lock.json
      - _config.yml
      - _layouts/canary.html
      - _layouts/default.html
  workflow_dispatch:
    # Manual trigger for debugging the spec.

permissions:
  # The spec drives admin via a fine-grained PAT (CMS_E2E_PAT) — the
  # workflow itself only needs contents:read to check out source.
  #
  # `pull-requests: write` is needed by the post-failure-comment
  # composite so the default GITHUB_TOKEN can post the failure-summary
  # comment via the issues comments API.
  #
  # `actions: read` lets the await-prod-deploy gate query this commit's
  # `Deploy to Production` run via the REST API.
  contents: read
  pull-requests: write
  actions: read

defaults:
  run:
    shell: bash

jobs:
  # Changed-files recursion gate. A push whose only changed files are
  # this loop's own canary churn skips the heavy job; schedule/dispatch
  # always run; any ambiguity fails OPEN. The `prod-mutating-loop` lane
  # lives on the heavy loop job, not the workflow, so this gate runs
  # OUTSIDE the lane: its skip decision is computed immediately even
  # while a real loop holds the lane.
  recursion-gate:
    runs-on: ubuntu-latest
    outputs:
      run: ${{ steps.gate.outputs.run }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2 (2026-01-09)
        with:
          fetch-depth: 2
      - name: Recursion gate
        id: gate
        uses: ./.github/actions/cms-recursion-gate
        with:
          loop: host

  host-loop:
    needs: [recursion-gate]
    runs-on: ubuntu-latest
    concurrency:
      # SHARED lane for ALL real-prod-mutating loop workflows
      # (cms-publish-loop-prod / cms-media-roundtrip / cms-publish-loop-host).
      # Declared on the HEAVY LOOP JOB, not the workflow: the cheap
      # recursion-gate job has no concurrency, so it runs OUTSIDE this lane
      # — its skip decision is computed immediately even while a real loop
      # holds the lane, and a recursion-skipped loop is `if:`-skipped before
      # it ever enters the lane (zero lane occupancy for recursion). GHA
      # keys concurrency groups by string ACROSS workflows, so one constant
      # group on these three loop jobs keeps them mutually exclusive: only
      # one real-prod loop runs at a time, whatever the trigger (push /
      # workflow_dispatch / host's daily cron all converge here). They each
      # mutate prod through Decap → cms-PR → auto-merge → deploy-production
      # and a parallel pair races deploy-production's `group: production`,
      # blowing each other's URL-reflect budgets. cancel-in-progress:false
      # queues rather than killing an in-flight loop (cancelling mid-flow
      # can leave the canary dirty); a stuck run holds the lane up to its
      # timeout-minutes, which is bounded and far cheaper than the collision.
      # This block MUST stay byte-identical across all three workflows AND
      # remain on the loop job (NOT the workflow) — enforced by
      # e2e/workflow-prod-loop-serialized.test.js.
      group: prod-mutating-loop
      cancel-in-progress: false
    env:
      # Site identity for the parameterized e2e helpers (base.js,
      # cms-host.js). Supplied by repo VARS so a consuming deployment
      # passes its own deployed URLs; CMS_REPO falls back to the repo.
      CMS_PROD_URL: ${{ vars.CMS_PROD_URL }}
      CMS_APEX: ${{ vars.CMS_APEX }}
      CMS_REPO: ${{ github.repository }}
    timeout-minutes: 105
    # Recursion guard delegated to the `recursion-gate` job above.
    if: ${{ needs.recursion-gate.outputs.run == 'true' }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2 (2026-01-09)

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0 (2026-04-20)
        with:
          node-version: "20"

      - name: Install harness deps
        working-directory: e2e
        run: npm ci

      - name: Install Playwright browser + system deps
        working-directory: e2e
        run: npx playwright install --with-deps chromium

      # Post-merge only: do NOT drive prod until THIS commit is live
      # (deploy-production succeeded + CDN serves the SHA or a newer
      # descendant; prod ahead of the merge is fine). Skipped on
      # workflow_dispatch/schedule (no associated merge). Fails loud if
      # the deploy failed.
      - name: Await prod deploy of this merge
        if: ${{ github.event_name == 'push' }}
        uses: ./.github/actions/await-prod-deploy
        with:
          prod-url: ${{ vars.CMS_PROD_URL }}

      - name: Run host-repo publish loop + delete-published specs
        working-directory: e2e
        env:
          # Fine-grained PAT scoped to the host repo (contents r/w +
          # pull_requests r/w + metadata r).
          CMS_E2E_PAT: ${{ secrets.CMS_E2E_PAT }}
          # Tells playwright.config.js (via TARGET=) NOT to spin up the
          # local Jekyll + decap-server webServer — the specs hit the
          # deployed prod URL directly.
          TARGET: prod
          # Opt-in marker the specs check; without it they self-skip.
          RUN_HOST_REPO_PUBLISH_LOOP: "1"
        run: |
          set -o pipefail
          # --max-failures=1 bails the whole run on the first failure.
          # --workers=1 serialises the specs: they all mutate prod via
          # Decap → cms/* PR → auto-merge → deploy-production, which has
          # `concurrency: { group: production, cancel-in-progress: false }`
          # — parallel specs queue multiple-deep on deploy and blow each
          # other's URL-wait budgets.
          npx playwright test \
            cms-publish-loop.spec.js \
            cms-delete-published.spec.js \
            cms-unpublish-republish.spec.js \
            cms-tags-lifecycle.spec.js \
            --project=chromium-desktop-3k \
            --reporter=list \
            --max-failures=1 \
            --workers=1 \
            2>&1 | tee /tmp/host-loop.log

      - name: Upload test results on failure
        if: ${{ failure() || cancelled() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1 (2026-04-10)
        with:
          name: host-loop-results
          path: |
            e2e/test-results/
            /tmp/host-loop.log
          retention-days: 14

      # Surface the Playwright failure block as a PR comment. Two call
      # sites — caller-side gating with failure()/success() is the
      # canonical pattern; the composite is mode-driven.
      - name: Post failure summary
        if: ${{ failure() && github.event_name == 'pull_request' }}
        uses: ./.github/actions/post-failure-comment
        with:
          mode: post
          log-file: /tmp/host-loop.log
          marker: host-loop-failure-summary
          title: host-loop

      - name: Resolve failure summary on success
        if: ${{ success() && github.event_name == 'pull_request' }}
        uses: ./.github/actions/post-failure-comment
        with:
          mode: resolve
          marker: host-loop-failure-summary
          title: host-loop
