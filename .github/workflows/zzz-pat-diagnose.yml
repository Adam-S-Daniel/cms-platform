# TEMPORARY diagnostic — triangulate what the REPO_SETTINGS_READ_* PATs can
# actually see/do. Informational only (always exits 0). Deleted after use.
name: zzz PAT diagnose

on:
  workflow_dispatch:
  pull_request:
    paths:
      - ".github/workflows/zzz-pat-diagnose.yml"

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - owner: Adam-S-Daniel
            repo: Adam-S-Daniel/cms-platform
          - owner: Adam-S-Daniel
            repo: Adam-S-Daniel/adamdaniel.ai
          - owner: jodidaniel
            repo: jodidaniel/jodidaniel.com
    name: diagnose ${{ matrix.owner }} ${{ matrix.repo }}
    env:
      TOKEN_ADAM_S_DANIEL: ${{ secrets.REPO_SETTINGS_READ_ADAM_S_DANIEL }}
      TOKEN_JODIDANIEL: ${{ secrets.REPO_SETTINGS_READ_JODIDANIEL }}
      OWNER: ${{ matrix.owner }}
      REPO: ${{ matrix.repo }}
    steps:
      - name: Diagnose ${{ matrix.repo }}
        run: |
          set +e
          case "$OWNER" in
            Adam-S-Daniel) GH_TOKEN="$TOKEN_ADAM_S_DANIEL" ;;
            jodidaniel)    GH_TOKEN="$TOKEN_JODIDANIEL" ;;
          esac
          export GH_TOKEN
          echo "############ $OWNER -> $REPO ############"
          echo "token present: $([ -n "$GH_TOKEN" ] && echo yes || echo NO)"
          # Token type heuristic: fine-grained start github_pat_, classic ghp_, oauth gho_
          case "$GH_TOKEN" in
            github_pat_*) echo "token type: fine-grained PAT" ;;
            ghp_*) echo "token type: classic PAT" ;;
            gho_*) echo "token type: OAuth" ;;
            *) echo "token type: unknown/other prefix" ;;
          esac

          echo "--- repo object (admin-gated fields) ---"
          gh api "repos/$REPO" >/tmp/repo.json 2>/tmp/repoerr
          echo "repo GET exit=$?  $( [ -s /tmp/repoerr ] && head -c 160 /tmp/repoerr | tr '\n' ' ' )"
          echo ".permissions          = $(jq -c '.permissions' /tmp/repo.json 2>&1)"
          echo "has(delete_branch_..) = $(jq '. | has("delete_branch_on_merge")' /tmp/repo.json 2>&1)"
          echo "delete_branch_on_merge= $(jq '.delete_branch_on_merge' /tmp/repo.json 2>&1)"
          echo "allow_squash_merge    = $(jq '.allow_squash_merge' /tmp/repo.json 2>&1)"
          echo "allow_auto_merge      = $(jq '.allow_auto_merge' /tmp/repo.json 2>&1)"
          echo "visibility            = $(jq -r '.visibility' /tmp/repo.json 2>&1)"

          probe () {
            local path="$1"
            if gh api "$path" >/dev/null 2>/tmp/pe; then
              echo "  [200] $path"
            else
              local code
              code=$(grep -oiE 'HTTP [0-9]{3}' /tmp/pe | head -1)
              [ -z "$code" ] && code=$(grep -oE '"status":[ ]*"[0-9]{3}"' /tmp/pe | grep -oE '[0-9]{3}' | head -1)
              echo "  [${code:-ERR}] $path :: $(head -c 140 /tmp/pe | tr '\n' ' ')"
            fi
          }
          echo "--- admin-gated endpoint statuses (403=no perm, 404=perm-but-absent, 200=perm+present) ---"
          probe "repos/$REPO/branches/main/protection"
          probe "repos/$REPO/actions/permissions"
          probe "repos/$REPO/actions/permissions/fork-pr-contributor-approval"
          probe "repos/$REPO/hooks"
          probe "repos/$REPO/rulesets"
          echo "--- rulesets detail (needs admin on many repos) ---"
          rid=$(gh api "repos/$REPO/rulesets" --jq '.[0].id' 2>/dev/null)
          if [ -n "$rid" ] && [ "$rid" != "null" ]; then probe "repos/$REPO/rulesets/$rid"; else echo "  (no ruleset id to detail-read)"; fi
          echo "############ end $REPO ############"
          exit 0
