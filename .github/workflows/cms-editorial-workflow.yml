name: CMS Editorial Workflow (reusable)
on:
  workflow_call:
    secrets:
      CMS_E2E_PAT:
        required: false
    inputs:
      # Where the content-pr-guard step's validate-content sub-step fetches
      # the Decap branch convention (e2e/cms-fixture-pr.js) and the guard
      # module (scripts/content-pr-guard.js) from. Pin `platform_ref` to the
      # same ref as the caller's `uses:` pin (same convention as
      # label-non-decap-prs.yml) so the two never disagree about what
      # "Decap-shaped" means.
      platform_repo:
        description: "owner/name of the platform repo holding e2e/cms-fixture-pr.js and scripts/content-pr-guard.js."
        type: string
        required: false
        default: Adam-S-Daniel/cms-platform
      platform_ref:
        description: "Tag/sha of the platform repo to fetch the module from (pin to the same ref as the caller's uses: pin)."
        type: string
        required: false
        default: main
permissions:
  contents: read
  pull-requests: write
  issues: write

# Concurrency is now per-job (see each job's `concurrency:` block).
# Workflow-level `cancel-in-progress: true` was racing the labeled
# event for cms/ready: a same-second `opened` + `labeled` pair would
# create two runs (one per event), the workflow-level group would
# cancel the first, and whichever run survived determined whether
# auto-merge-when-ready fired (its `if:` only matches the labeled
# event, so the survivor needed to be the labeled-event run for
# auto-merge to be enabled). When the opened-event run won the
# race — observed on PRs #210 and similar fixture PRs — auto-merge
# was never enabled, the PR sat for 12 minutes, and the spec timed
# out in waitForMerge.
#
# Splitting concurrency into per-job groups ensures auto-merge-when-ready
# always runs to completion when its labeled event fires.
#
# validate-content has NO `concurrency` block at all (#1815). The canary PRs
# fire several editorial-workflow runs on the SAME head sha (a same-second
# `opened` + `synchronize` + `labeled` burst, then each cms/draft→cms/ready→
# decap-cms/* label flip — none of which changes the sha). ANY concurrency
# group on this job leaves a CANCELLED `validate-content` check-run on that sha:
# with `cancel-in-progress: true` the in-flight run is cancelled; and — the
# subtle one that defeated the first fix — with `cancel-in-progress: FALSE`
# GitHub still keeps only the running run + the LATEST pending run and CANCELS
# the other pending dups in the group (GitHub's documented behaviour), so a
# 4-run burst still leaves ~2 cancelled. GitHub branch protection then evaluates
# the required `editorial / validate-content` context NON-DETERMINISTICALLY when
# both a cancelled and a success run exist on the sha: sometimes success wins
# (the PR merges — e.g. #1984/#1990/#1993), sometimes the cancelled wins and the
# merge is HARD-BLOCKED ("Required status check 'editorial / validate-content'
# is cancelled", HTTP 405 — e.g. #1986/#1996), which no merge mechanism (native
# auto-merge, explicit pulls.merge, or the nudge) can override — THE cause of
# the wedged loops. With NO concurrency the same-sha runs all run independently
# to SUCCESS → never a cancelled run → the context is unambiguously green. Cost:
# a few extra ~30s runs per PR (each on its own — GitHub's repo-level limit
# still queues them); cheap, and correctness wins.
#
# validate-content ALSO runs the content PR conformance guard (the "Content PR
# conformance guard" step below): PRs that touch CMS-managed content but were
# NOT opened by Decap fail this same check, with a PR comment explaining the
# restriction and its escape hatch (a maintainer applies the override label —
# see scripts/content-pr-guard.js's OVERRIDE_LABEL, deliberately not re-typed
# here so the two can't drift; the resulting `labeled` event re-runs this job
# and it then passes). No new required check and no ruleset change — it rides
# the existing required `editorial / validate-content` context. Callers
# should pin this workflow's `platform_ref` input to the same tag/sha as
# their `uses:` pin (see `on.workflow_call.inputs` above) so the guard's
# notion of "Decap-shaped" never drifts from the reusable's own version.

jobs:
  validate-content:
    # NO `concurrency:` block — see the header comment (#1815). Any concurrency
    # group (even cancel-in-progress:false) leaves a cancelled `validate-content`
    # check-run on a same-sha burst, which non-deterministically blocks the
    # required-context merge gate. Independent same-sha runs all complete
    # success instead.
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v6.0.2 (2026-01-09)
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Checkout platform module
        # The Decap branch-prefix constant (e2e/cms-fixture-pr.js's
        # FIXTURE_BRANCH_PREFIX) and the content-pr-guard module
        # (scripts/content-pr-guard.js) both live in the platform, not the
        # site repo. Fetch them from the pinned ref so the guard stays in
        # lockstep with the labeller (label-non-decap-prs.yml) and the
        # fixture harness on what "Decap-shaped" means.
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v6.0.2 (2026-01-09)
        with:
          repository: ${{ inputs.platform_repo }}
          ref: ${{ inputs.platform_ref }}
          path: .cms-platform

      - name: Content PR conformance guard
        # FAIL FAST, before Ruby/Jekyll: PRs that touch CMS-managed content
        # (posts, tags, projects, pages, e2e fixtures, uploaded media — see
        # scripts/content-pr-guard.js's BASE_CONTENT_DIRS + this site's
        # admin/collections.site.yml) must have been opened BY Decap CMS,
        # not by hand. A non-Decap edit to those paths skips the entry's
        # draft/review/ready status, its stable preview alias, and publish/
        # schedule semantics — and can collide with Decap's own on-repo
        # state. This step fails the already-required `validate-content`
        # check (no new required check, no ruleset change) and leaves a
        # comment explaining the restriction and the escape hatch: a
        # maintainer can apply the override label (OVERRIDE_LABEL, sourced
        # from scripts/content-pr-guard.js below — not re-typed here) for
        # deliberate maintenance (fixture repair, bulk migration) — the
        # `labeled` event re-runs this check and it then passes.
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3  # v9.0.0 (2026-04-09)
        with:
          script: |
            const path = require('path');
            const fs = require('fs');

            // Source the Decap branch convention from the platform module so
            // this guard stays in lockstep with label-non-decap-prs.yml and
            // the fixture harness (same pattern as that workflow).
            const { FIXTURE_BRANCH_PREFIX } = require(
              path.join(process.env.GITHUB_WORKSPACE, '.cms-platform', 'e2e', 'cms-fixture-pr.js'),
            );
            const DECAP_BRANCH_PREFIX = `${FIXTURE_BRANCH_PREFIX.split('/')[0]}/`;

            const { evaluateContentGuard, COMMENT_MARKER, OVERRIDE_LABEL } = require(
              path.join(process.env.GITHUB_WORKSPACE, '.cms-platform', 'scripts', 'content-pr-guard.js'),
            );

            const { owner, repo } = context.repo;
            const pr = context.payload.pull_request;

            const files = await github.paginate(github.rest.pulls.listFiles, {
              owner,
              repo,
              pull_number: pr.number,
              per_page: 100,
            });
            const changedFiles = files.map((f) => f.filename);

            // The site's site-specific collections (if any) — folded into
            // BASE_CONTENT_DIRS by evaluateContentGuard. Absent on a
            // single-collection site, so a missing file is not an error.
            let seamYamlText = null;
            try {
              seamYamlText = fs.readFileSync('admin/collections.site.yml', 'utf8');
            } catch (_) {
              seamYamlText = null;
            }

            // Derive the site's /admin URL from its own _config.yml so this
            // guard never hardcodes a site's identity. Falls back to the
            // bare path if `url:` isn't found.
            let adminUrl = '/admin/';
            try {
              const configText = fs.readFileSync('_config.yml', 'utf8');
              const head = configText.split('\n').slice(0, 50).join('\n');
              const match = head.match(/^url:\s*(.+?)\s*$/m);
              if (match) {
                const url = match[1].replace(/^["']|["']$/g, '').trim().replace(/\/+$/, '');
                if (url) adminUrl = `${url}/admin/`;
              }
            } catch (_) {
              /* fall back to the bare path */
            }

            const result = evaluateContentGuard({
              pr,
              changedFiles,
              seamYamlText,
              decapBranchPrefix: DECAP_BRANCH_PREFIX,
              adminUrl,
            });

            // All comment/label API work is wrapped so a GitHub API hiccup
            // here can never flip the verdict computed above.
            try {
              // Ensure the override label exists so a maintainer can apply
              // it from the PR UI (same createLabel-in-try/catch pattern as
              // the cms/draft + cms/ready labels below in this file).
              try {
                await github.rest.issues.createLabel({
                  owner,
                  repo,
                  name: OVERRIDE_LABEL,
                  color: '5319e7',
                  description: 'Maintainer override: allow non-Decap content changes in this PR',
                });
              } catch (_) {}

              const comments = await github.paginate(github.rest.issues.listComments, {
                owner,
                repo,
                issue_number: pr.number,
                per_page: 100,
              });
              const existing = comments.find((c) => (c.body || '').includes(COMMENT_MARKER));

              if (result.verdict === 'fail') {
                if (existing) {
                  await github.rest.issues.updateComment({
                    owner,
                    repo,
                    comment_id: existing.id,
                    body: result.commentBody,
                  });
                } else {
                  await github.rest.issues.createComment({
                    owner,
                    repo,
                    issue_number: pr.number,
                    body: result.commentBody,
                  });
                }
              } else if (existing) {
                await github.rest.issues.updateComment({
                  owner,
                  repo,
                  comment_id: existing.id,
                  body: `${COMMENT_MARKER}\n✅ Content guard passed at ${pr.head.sha} (${result.reason}).`,
                });
              }
            } catch (err) {
              core.warning(`content-pr-guard: comment/label upsert failed (${err.message}); verdict unaffected.`);
            }

            if (result.verdict === 'fail') {
              core.info(`content-pr-guard: non-Decap content change — offending file(s):\n${result.contentFiles.join('\n')}`);
              core.setFailed(
                `Non-Decap PR touches ${result.contentFiles.length} CMS-managed content file(s) — see the PR comment for why, and the ${OVERRIDE_LABEL} escape hatch.`,
              );
            }

      - name: Setup Ruby
        uses: ruby/setup-ruby@d45b1a4e94b71acab930e56e79c6aa188764e7f9  # v1.310.0 (2026-05-20)
        with:
          ruby-version: '3.2'
          bundler-cache: true

      - name: Validate front matter
        run: |
          # `nullglob` makes `_posts/*.md` expand to an empty list rather
          # than the literal pattern when there are no posts (otherwise
          # grep tries to read `_posts/*.md` as a filename and the loop
          # falsely flags it as a missing-title post).
          shopt -s nullglob
          echo "Checking post front matter..."
          ERRORS=0

          for f in _posts/*.md; do
            # Every post must have title, date, and published fields
            if ! grep -q "^title:" "$f"; then
              echo "ERROR: $f is missing 'title' field"
              ERRORS=$((ERRORS+1))
            fi
            if ! grep -q "^date:" "$f"; then
              echo "ERROR: $f is missing 'date' field"
              ERRORS=$((ERRORS+1))
            fi
          done

          if [ "$ERRORS" -gt 0 ]; then
            echo "Found $ERRORS validation error(s). Please fix before merging."
            exit 1
          fi
          echo "All content validated successfully."

      - name: Jekyll build check
        env:
          JEKYLL_ENV: test
        run: bundle exec jekyll build --quiet

      - name: Apply draft label on new PR
        if: github.event.action == 'opened'
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3  # v9.0.0 (2026-04-09)
        with:
          script: |
            // Ensure the 'cms/draft' label exists
            try {
              await github.rest.issues.createLabel({
                owner: context.repo.owner,
                repo:  context.repo.repo,
                name:  'cms/draft',
                color: '1a2a5e',
                description: 'Content draft — not ready for publish',
              });
            } catch (_) {}

            try {
              await github.rest.issues.createLabel({
                owner: context.repo.owner,
                repo:  context.repo.repo,
                name:  'cms/ready',
                color: '22c27a',
                description: 'Content approved and ready to publish',
              });
            } catch (_) {}

            var labels = ['cms/draft'];

            // Mark CMS PRs whose base isn't `main` as preview-only — they
            // exist to demonstrate / test the parent feature branch's
            // changes against real content, and the content edit itself
            // is not meant to flow to main when the feature merges.
            if (context.payload.pull_request.base.ref !== 'main') {
              try {
                await github.rest.issues.createLabel({
                  owner: context.repo.owner,
                  repo:  context.repo.repo,
                  name:  'cms/preview-only',
                  color: 'f5a623',
                  description: 'CMS edit made on a feature-branch preview — drop this content from the parent branch when it merges to main',
                });
              } catch (_) {}
              labels.push('cms/preview-only');
            }

            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              issue_number: context.payload.pull_request.number,
              labels: labels,
            });

  auto-merge-when-ready:
    # Fires when an editor promotes a draft to "Ready":
    #
    #   - `decap-cms/pending_publish` is what Decap CMS 3.x actually
    #     applies when the editor changes the Status dropdown from
    #     Draft / In Review to Ready in editorial-workflow mode.
    #     (The doc comment used to claim Decap applies
    #     `decap-cms/ready`, but that's a label name Decap never
    #     actually emits — empirical check on PR #220's event
    #     timeline confirmed the real label is
    #     `decap-cms/pending_publish`. The semantic is the same:
    #     "approved, ready to publish".) This is the path 99% of
    #     edits take.
    #   - `decap-cms/ready` is kept as a synonym in case a future
    #     Decap rename emits it, or in case a different backend
    #     still uses that name. Cheap to keep; harmless to leave.
    #   - `cms/ready` is the legacy bare-name label this workflow
    #     applies on `opened` (so a manual label add still works)
    #     and was the only label this job listened for before the
    #     Decap namespacing landed. The shim in
    #     admin/publish-via-auto-merge.js also adds it when it
    #     catches a 422 from a direct merge attempt.
    #
    # If multiple fire, the second `labeled` event re-runs this job;
    # `enablePullRequestAutoMerge` is idempotent so the duplicate is
    # a no-op.
    #
    # NOTE: `decap-cms/pending_review` is intentionally NOT in this
    # list. It means "submitted for review" — the entry isn't yet
    # approved, so auto-merging at that point would skip the human-
    # review step that the editorial workflow exists to support.
    if: >
      github.event.action == 'labeled' &&
      (github.event.label.name == 'cms/ready' ||
       github.event.label.name == 'decap-cms/ready' ||
       github.event.label.name == 'decap-cms/pending_publish')
    # Per-job concurrency with cancel-in-progress:false so multiple
    # rapid label toggles queue rather than cancel each other.
    # `enablePullRequestAutoMerge` is idempotent — re-running it on
    # an already-auto-mergeable PR is a no-op. The workflow-level
    # cancel that used to live here was THE bug: a same-second
    # opened+labeled pair on a new PR could let the opened-event
    # run cancel the labeled-event run mid-evaluation, leaving
    # auto-merge unenabled and the PR stuck for ~12 min. (Observed
    # on PR #210 — only `auto_squash_enabled` event missing in its
    # timeline despite the cms/ready label being added.)
    concurrency:
      group: cms-editorial-auto-merge-${{ github.event.pull_request.number }}
      cancel-in-progress: false
    # `needs: validate-content` removed: enablePullRequestAutoMerge
    # only sets the *intent* to merge — GitHub waits for the
    # required-status-checks ruleset (which includes validate-content)
    # before actually firing the merge. Making this job wait on
    # validate-content was redundant *and* coupled it to the same
    # cancel-in-progress mechanic that caused the original bug.
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Enable auto-merge for CMS PR
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3  # v9.0.0 (2026-04-09)
        with:
          # CMS_E2E_PAT, NOT the default GITHUB_TOKEN. GitHub's policy
          # is that push events created by GITHUB_TOKEN don't trigger
          # downstream workflows (the same anti-loop guard that makes
          # `pull_request_target` necessary for Dependabot PRs). When
          # we used GITHUB_TOKEN to enable auto-merge, the eventual
          # merge happened as github-actions[bot]; the push to main
          # from that merge silently failed to fire
          # deploy-production.yml. Real-world impact: every CMS edit
          # via Decap's "Status: Ready → auto-merge" path merged the
          # PR but never deployed to S3, so the live site stayed at
          # whatever the last NON-CMS push had built. Empirical: PR
          # #238's seed merge at 23:32 didn't trigger
          # deploy-production until a non-bot push (PR #241) landed
          # at 23:46.
          #
          # Using CMS_E2E_PAT means `enablePullRequestAutoMerge` runs
          # as that user, GitHub merges the PR with that user's
          # identity, and the resulting push to main DOES fire
          # deploy-production.yml like every other non-bot push.
          github-token: ${{ secrets.CMS_E2E_PAT || secrets.GITHUB_TOKEN }}
          script: |
            // The synonym labels (`cms/ready`, `decap-cms/ready`,
            // `decap-cms/pending_publish`) can arrive after the PR has
            // already merged — e.g. Decap applies `decap-cms/pending_publish`
            // and the shim's `cms/ready` in quick succession, the first
            // run enables auto-merge, GitHub squashes immediately, and
            // the second `labeled` event then fires this job against a
            // PR whose state is already MERGED. `enablePullRequestAutoMerge`
            // responds with the GraphQL error "Pull request is already
            // merged" in that case. The desired end state — merged — is
            // already achieved, so swallow that specific error and exit
            // success rather than failing the run and tripping the
            // stuck-PR triage path.
            try {
              await github.graphql(`
                mutation($pullRequestId: ID!) {
                  enablePullRequestAutoMerge(input: {
                    pullRequestId: $pullRequestId,
                    mergeMethod: SQUASH,
                    commitHeadline: "publish: ${context.payload.pull_request.title}"
                  }) {
                    pullRequest {
                      autoMergeRequest { enabledAt }
                    }
                  }
                }
              `, { pullRequestId: context.payload.pull_request.node_id });
            } catch (err) {
              const msg = String(err && err.message || err);
              if (/pull request is already merged/i.test(msg)) {
                core.info(`PR #${context.payload.pull_request.number} is already merged; nothing to do.`);
                return;
              }
              // "Pull request is in clean status" — every required check has
              // ALREADY passed, so auto-merge cannot be *enabled* (there is
              // nothing left to wait for). GitHub's own error is the
              // authoritative "mergeable right now" signal (do NOT key this off
              // the webhook payload's stale, async-computed `mergeable` flag —
              // it can read true while checks are still pending). Land it
              // directly with a squash merge, as the SAME CMS_E2E_PAT identity
              // so the merge push fires deploy-production. Branch protection
              // still enforces the required checks at merge time, so this can
              // only ever land a genuinely-green PR. Without this fallback a PR
              // whose checks went green before this job ran would throw here,
              // fail the run, and never merge — the very stall the host loop
              // (#80) and #85 chase. Mirrors the cms-automerge-nudge recovery.
              if (/clean status/i.test(msg)) {
                try {
                  await github.rest.pulls.merge({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    pull_number: context.payload.pull_request.number,
                    merge_method: 'squash',
                  });
                  core.info(`PR #${context.payload.pull_request.number} was clean; merged directly.`);
                  return;
                } catch (mErr) {
                  const mMsg = String((mErr && mErr.message) || mErr);
                  // Idempotent: a racing run (the two label events share a
                  // serialised per-PR concurrency lane) may have already landed
                  // it, or the PR may have closed — either way the desired end
                  // state holds, so don't fail the run.
                  if (/already merged|not mergeable|not found|closed/i.test(mMsg)) {
                    core.info(`direct merge no-op for PR #${context.payload.pull_request.number}: ${mMsg}`);
                    return;
                  }
                  throw mErr;
                }
              }
              // "Pull request is in unstable status" — sibling of "clean status"
              // above, same root cause: a PR whose base isn't `main` (labelled
              // `cms/preview-only` by validate-content's "Apply draft label on new
              // PR" step) has NO required-status-check protection rules on that
              // base branch, so GitHub's auto-merge "wait for checks" mechanism
              // has nothing well-defined to wait FOR and refuses to arm at all.
              // "clean status" means every check already finished (nothing left
              // to wait for); "unstable status" means checks are still in flight
              // but there's no protected-branch ruleset telling GitHub what "done"
              // looks like on this base — either way `enablePullRequestAutoMerge`
              // can never succeed for these PRs. Empirical: PR #2466 (base
              // `audit/preview-exercise`, all content checks already green) hit
              // exactly this in run 28758624761 — `enablePullRequestAutoMerge`
              // returned `UNPROCESSABLE: Pull request is in unstable status`.
              //
              // This job fires ONLY on the `labeled` event for one of the three
              // ready-labels (see the job's `if:` above) — nothing re-triggers it
              // when validate-content finishes afterward. So a bounded in-job poll
              // is the PRIMARY recovery mechanism here, not a nice-to-have:
              // without it, this run throws, the PR's rollup goes UNSTABLE, and
              // the PR sits waiting only on cms-automerge-nudge.yml's `*/5` cron
              // (throttled to ~45-90 min in practice) or the eventual e2e spec's
              // last-ditch recoverer. PR #2466 sat 26+ minutes green-but-unmerged
              // this way.
              if (/unstable status/i.test(msg)) {
                const POLL_INTERVAL_MS = 30_000;
                const POLL_BUDGET_MS = 10 * 60 * 1000;
                const deadline = Date.now() + POLL_BUDGET_MS;
                // ── Readiness test: per-check + SELF-EXCLUDING, NOT mergeable_state ──
                //
                // The first version of this poll (v0.1.52) gated on
                // `pr.mergeable_state` reaching `'clean'`, which SELF-DEADLOCKS: this very
                // job is a check run on the PR's head sha, and it stays in_progress
                // for the entire poll, so the rollup can never leave "unstable"
                // while we're the ones watching it. Empirical (PR #2469 / run
                // 28761800674): every other check run on head 46bc047 completed by
                // 01:19:35, yet the poll ran its full 10 minutes and logged "gave
                // up polling after 10 min without reaching clean/mergeable" at
                // 01:29:36 — the ONLY pending check run that whole time was this
                // job's own (completed 01:29:38, two seconds after the give-up).
                // The PR was then left to cms-automerge-nudge.yml's cron (~45-90
                // min effective cadence), which is what actually blew the preview
                // spec's 25-min waitForMerge budget.
                //
                // So judge readiness per-check, excluding ourselves:
                //   1. Check runs on the head sha (paginated), MINUS every
                //      `auto-merge-when-ready` run, must all be completed with
                //      success/neutral/skipped. Exclusion is by job NAME plus
                //      own-run-id (details_url carries /actions/runs/<run_id>/);
                //      the name match is load-bearing, not belt-and-braces: a
                //      SIBLING auto-merge-when-ready run (a second ready-label
                //      event, e.g. Decap's decap-cms/pending_publish after the
                //      shim's cms/ready) sits QUEUED in this job's per-PR
                //      concurrency group (cancel-in-progress:false) and can never
                //      even start — let alone complete — while we hold the lane;
                //      counting it would be the same deadlock through a side door.
                //   2. Legacy commit statuses (combined status API) must be green
                //      IF any exist — deploy-preview.yml posts a real
                //      `deploy/preview` commit status on PR head shas, so statuses
                //      are live on these repos and can't be skipped. GitHub reports
                //      state:"pending" for an EMPTY status set (total_count 0), so
                //      emptiness must count as OK, not pending.
                //   3. pulls.get must show `mergeable !== false` (false = computed
                //      conflict; null = still computing, which the merge attempt
                //      itself adjudicates — see the transient-retry in its catch).
                // No protection is weakened: the explicit squash merge below is the
                // same call the clean-status branch already makes, and these
                // preview-only bases have no required-check ruleset to bypass.
                const prNumber = context.payload.pull_request.number;
                const OK_CONCLUSIONS = new Set(['success', 'neutral', 'skipped']);
                const isOwnJobClass = (c) =>
                  /auto-merge-when-ready/.test(c.name || '') ||
                  String(c.details_url || '').includes(`/actions/runs/${context.runId}`) ||
                  String(c.html_url || '').includes(`/actions/runs/${context.runId}`);
                core.info(
                  `PR #${prNumber} is unstable (unprotected base — cms/preview-only); ` +
                    `polling per-check readiness (self-excluding) for up to ` +
                    `${POLL_BUDGET_MS / 60000} min.`,
                );
                while (Date.now() < deadline) {
                  await new Promise((resolve) => setTimeout(resolve, POLL_INTERVAL_MS));
                  let pr;
                  try {
                    // Fresh GET every tick — Decap force-pushes the same cms/*
                    // branch on re-saves, so the head sha we inspect must be
                    // re-read, never cached from the stale webhook payload.
                    ({ data: pr } = await github.rest.pulls.get({
                      owner: context.repo.owner,
                      repo: context.repo.repo,
                      pull_number: prNumber,
                    }));
                  } catch (getErr) {
                    core.warning(
                      `poll: pulls.get failed transiently (${String((getErr && getErr.message) || getErr)}); retrying.`,
                    );
                    continue;
                  }
                  if (pr.state !== 'open') {
                    core.info(`PR #${prNumber} is no longer open (${pr.state}); nothing to do.`);
                    return;
                  }
                  if (pr.mergeable === false) {
                    // Computed conflict. Keep polling — a base update or the
                    // newline-conflict auto-resolver can clear it within the
                    // budget; if not, the nudge inherits it.
                    core.info(`poll: PR #${prNumber} has a merge conflict (mergeable:false); waiting.`);
                    continue;
                  }
                  let checkRuns;
                  try {
                    checkRuns = await github.paginate(github.rest.checks.listForRef, {
                      owner: context.repo.owner,
                      repo: context.repo.repo,
                      ref: pr.head.sha,
                      per_page: 100,
                    });
                  } catch (cErr) {
                    core.warning(
                      `poll: checks.listForRef failed transiently (${String((cErr && cErr.message) || cErr)}); retrying.`,
                    );
                    continue;
                  }
                  const others = checkRuns.filter((c) => !isOwnJobClass(c));
                  const pending = others.filter((c) => c.status !== 'completed');
                  const red = others.filter(
                    (c) => c.status === 'completed' && !OK_CONCLUSIONS.has(c.conclusion),
                  );
                  let combined;
                  try {
                    ({ data: combined } = await github.rest.repos.getCombinedStatusForRef({
                      owner: context.repo.owner,
                      repo: context.repo.repo,
                      ref: pr.head.sha,
                    }));
                  } catch (sErr) {
                    core.warning(
                      `poll: combined-status read failed transiently (${String((sErr && sErr.message) || sErr)}); retrying.`,
                    );
                    continue;
                  }
                  const statusesOk = combined.total_count === 0 || combined.state === 'success';
                  if (pending.length > 0 || red.length > 0 || !statusesOk) {
                    core.info(
                      `poll: PR #${prNumber} not ready — ${pending.length} pending / ` +
                        `${red.length} red check run(s) (self excluded), combined status ` +
                        `${combined.total_count === 0 ? 'empty' : combined.state}` +
                        (pending.length
                          ? `; pending: ${pending.slice(0, 3).map((c) => c.name).join(', ')}`
                          : '') +
                        (red.length
                          ? `; red: ${red.slice(0, 3).map((c) => `${c.name}=${c.conclusion}`).join(', ')}`
                          : ''),
                    );
                    continue;
                  }
                  try {
                    await github.rest.pulls.merge({
                      owner: context.repo.owner,
                      repo: context.repo.repo,
                      pull_number: prNumber,
                      merge_method: 'squash',
                    });
                    core.info(
                      `PR #${prNumber}: all non-self check runs green + statuses ok; merged directly.`,
                    );
                    return;
                  } catch (mErr) {
                    const mMsg = String((mErr && mErr.message) || mErr);
                    // Terminal no-ops, same handling as the clean-status branch.
                    if (/already merged|not found|closed/i.test(mMsg)) {
                      core.info(`direct merge no-op for PR #${prNumber}: ${mMsg}`);
                      return;
                    }
                    // "not mergeable" here is TRANSIENT, not terminal: the
                    // readiness test saw mergeable !== false (possibly null =
                    // still computing), so let GitHub finish computing and try
                    // again next tick instead of abandoning the PR to the cron.
                    if (/not mergeable/i.test(mMsg)) {
                      core.info(`poll: merge not accepted yet for PR #${prNumber} (${mMsg}); retrying.`);
                      continue;
                    }
                    throw mErr;
                  }
                }
                // Budget exhausted without landing. Do NOT throw / setFailed
                // here: a job failure poisons the PR's rollup (mergeStateStatus
                // UNSTABLE), which is the very problem this fallback exists to
                // avoid. Exit success and let cms-automerge-nudge.yml's cron
                // backstop it — that job now also covers preview-only
                // (base!=main) PRs (see its own comments) for exactly this
                // "checks took longer than our budget" case. With the self-
                // excluding readiness test this branch should now only be
                // reached when a NON-self check genuinely ran long or red.
                core.info(
                  `PR #${prNumber}: gave up polling after ` +
                    `${POLL_BUDGET_MS / 60000} min without all non-self checks settling green; ` +
                    `leaving it to cms-automerge-nudge.yml's cron backstop.`,
                );
                return;
              }
              throw err;
            }

