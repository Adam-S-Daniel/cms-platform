# Reusable: unattended-merge gate for Dependabot PRs.
#
# A consuming site calls this from a thin wrapper that owns the
# `pull_request` trigger + run-name (see
# examples/site/.github/workflows/dependabot-auto-merge.yml). No external
# script deps. Part of the platform down-sync: it auto-merges the
# platform-bump / gem Dependabot PRs once CI is green. Nothing site-specific
# is hardcoded — `gh` infers the repo from the runner, and the PR fields come
# from the caller's `pull_request` event.
name: Dependabot auto-merge (reusable)

# Flow:
#   1. Confirm the actor is dependabot[bot] (defence in depth — the
#      job-level `if:` would already skip non-Dependabot PRs).
#   2. Confirm the PR diff only touches dependency-manifest paths.
#      Dependabot already restricts itself to those by design, so a
#      diff outside this allowlist is a sign something is wrong —
#      bail out and leave the PR for human review.
#   3. Enable GitHub's native auto-merge with --squash. GitHub holds
#      the merge until every required status check on `main` passes
#      (e.g. e2e, visual-regression / approve-regression).
#
# Once the merge fires, the site's deploy-production workflow runs on the
# resulting push to main and ships the change. Preview environments per PR
# are already covered by deploy-preview's pull_request trigger and come up
# the moment Dependabot opens the PR.
#
# Security updates: Dependabot's 7-day cooldown applies to version
# updates only, not security updates. A vulnerability bump opens a PR
# immediately, lands here on the same auto-merge gate, and ships as
# soon as the test matrix is green.

on:
  workflow_call:

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    if: github.actor == 'dependabot[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v6.0.2 (2026-01-09)
        with:
          fetch-depth: 0

      - name: Fetch base ref
        run: git fetch origin "${{ github.event.pull_request.base.ref }}"

      - name: Get Dependabot metadata
        # Surfaces dependency-name / update-type / etc. as outputs.
        # Even though we don't gate on update-type (we trust the test
        # matrix to catch breakage in major bumps), the action also
        # validates that the PR genuinely came from Dependabot.
        id: metadata
        uses: dependabot/fetch-metadata@25dd0e34f4fe68f24cc83900b1fe3fe149efef98  # v3.1.0 (2026-04-20)

      - name: Verify only manifest paths changed
        id: paths
        # Path allowlist: only dependency manifests and workflow
        # files. Dependabot doesn't touch anything else, so a diff
        # outside this list means either a misconfiguration or a
        # tampered branch — either way, refuse to auto-merge. The
        # allowlist itself lives in scripts/check-dependabot-manifest-paths.sh
        # — the single source shared with dependabot-rearm-sweep.yml's
        # scheduled re-arm sweep (see AGENTS.md "Dependabot batch-strand
        # re-arm sweep"); keep both call sites in lockstep.
        run: |
          set -euo pipefail
          BASE="origin/${{ github.event.pull_request.base.ref }}"
          HEAD="${{ github.event.pull_request.head.sha }}"

          if bash scripts/check-dependabot-manifest-paths.sh "$BASE" "$HEAD"; then
            echo "safe=true" >> "$GITHUB_OUTPUT"
          else
            echo "safe=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Enable auto-merge
        if: steps.paths.outputs.safe == 'true'
        # --auto enables the same auto-merge feature exposed in the
        # GitHub UI: GitHub holds the merge until every required
        # status check on `main` reports success. The merge method
        # matches the CMS editorial workflow's choice (squash) so
        # main keeps a linear history of single-commit landings.
        run: gh pr merge --auto --squash "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Disable auto-merge (path check failed)
        if: steps.paths.outputs.safe == 'false'
        # If a previous run already enabled auto-merge but the PR was
        # later updated to touch content paths, undo the enablement
        # so the merge can't fire. `|| true` because `--disable-auto`
        # errors when auto-merge wasn't enabled — we don't care.
        run: |
          gh pr merge --disable-auto "$PR_URL" || true
          echo "::error::PR touches paths outside the dependency-manifest allowlist; auto-merge disabled."
          exit 1
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
