# Self-caller: dogfood the secrets-scan reusable on cms-platform's OWN
# history. The reusable (secrets-scan.yml) is otherwise consumed by sites
# via a thin caller; here the platform calls it LOCALLY (./.github/workflows/…)
# so the machinery repo — which itself handles the PAT/AWS wiring every
# consumer's scan protects — gets the same gitleaks coverage. Triggers mirror
# the consumer caller: PR (diff scan), push to main (incremental scan), and a
# weekly full-history sweep (so a leak introduced via a force-push or rebase
# still surfaces), plus workflow_dispatch for on-demand runs.
name: Self secrets scan

# Dynamic per-run title (issue #1776 grammar; enforced by
# e2e/workflow-run-name.test.js). Four events, so the run-name branches on
# `github.event_name`. The `>-` block scalar keeps the `#` in `PR #{0}`
# literal content (a single-line unquoted `#` would be a YAML comment).
run-name: >-
  ${{ github.event_name == 'pull_request'
        && format('PR #{0} — {1}', github.event.pull_request.number, github.event.pull_request.title)
   || github.event_name == 'push'
        && format('push — {0} @{1}', github.ref_name, github.actor)
   || github.event_name == 'schedule'
        && format('scheduled — {0}', github.event.schedule)
   || format('manual — @{0}', github.actor) }}

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  schedule:
    - cron: '0 7 * * 0'   # weekly full-history sweep
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

jobs:
  scan:
    uses: ./.github/workflows/secrets-scan.yml
