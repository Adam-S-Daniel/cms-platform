# Reusable preview-env parity loops for platform sites.
#
# Companion to cms-publish-loop-preview.yml: runs the three remaining
# real-backend loops that otherwise had prod-only coverage —
# prod-mutation (_posts/ body edit + publish toggle), unpublish/
# re-publish, and the Tags-collection lifecycle — against the SAME
# per-PR preview environment, targeting the parent PR's head ref.
#
# A consuming site calls this from a thin wrapper (see
# examples/site/.github/workflows/cms-preview-loops.yml). The harness +
# composite live in the platform, checked out into `.cms-platform/`.
#
# PLATFORM PORT NOTES (vs adamdaniel.ai@origin/main): GHCR build-image +
# `container:` DROPPED for inline deps; the `if: ${{ false }}` operational
# disable (adamdaniel-only dispatcher incident) NOT carried over; stuck-PR
# diagnostic DROPPED.
#
# Spec gating: every cms-*-preview.spec.js self-skips when CMS_E2E_PAT,
# PR_NUMBER, or PR_HEAD_REF is unset.
name: CMS Preview Loops — Parity (reusable)

on:
  workflow_call:
    inputs:
      pr_number:
        description: "Parent PR number (the preview env to target). Must be open with a working preview-pr<N>.<apex>."
        required: true
        type: string
      apex:
        description: "Site apex domain, e.g. example.com (no scheme); wired to CMS_APEX."
        required: false
        type: string
        default: ""
      platform_repo:
        description: "owner/name of the platform repo holding the e2e harness + composite action."
        required: false
        type: string
        default: Adam-S-Daniel/cms-platform
      platform_ref:
        description: "Tag/sha of the platform repo to fetch the harness from (pin to the same ref as this workflow)."
        required: false
        type: string
        default: main
    secrets:
      CMS_E2E_PAT:
        required: false

permissions:
  contents: read
  pull-requests: write

defaults:
  run:
    shell: bash

jobs:
  preview-loops:
    runs-on: ubuntu-latest
    env:
      CMS_APEX: ${{ inputs.apex }}
      CMS_REPO: ${{ github.repository }}
    # Three heavy specs run serially (~10-12 min happy path each). The
    # 90-min ceiling is the backstop; per-spec TEST_TIMEOUT_MS fires
    # first and --max-failures=1 bails the run on the first failure.
    timeout-minutes: 90
    steps:
      - name: Checkout site
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2 (2026-01-09)

      - name: Checkout platform (e2e harness + composite action)
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2 (2026-01-09)
        with:
          repository: ${{ inputs.platform_repo }}
          ref: ${{ inputs.platform_ref }}
          path: .cms-platform

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0 (2026-04-20)
        with:
          node-version: "20"

      - name: Install harness deps
        working-directory: .cms-platform/e2e
        run: npm ci

      - name: Install Playwright browser + system deps
        working-directory: .cms-platform/e2e
        run: npx playwright install --with-deps chromium

      - name: Resolve PR head ref
        id: pr
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3  # v9.0.0 (2026-04-09)
        env:
          PR_NUMBER_INPUT: ${{ inputs.pr_number }}
        with:
          script: |
            const prNumber = parseInt(process.env.PR_NUMBER_INPUT, 10);
            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
            });
            if (pr.state !== "open") {
              core.setFailed(
                `PR #${prNumber} is not open (state=${pr.state}). The preview env may already be torn down.`,
              );
              return;
            }
            if (!pr.head || !pr.head.ref) {
              core.setFailed(`Could not resolve head ref for PR #${prNumber}.`);
              return;
            }
            core.setOutput("head_ref", pr.head.ref);
            core.notice(`Resolved PR #${prNumber} → head_ref=${pr.head.ref}`);

      - name: Run preview-env parity loops (prod-mutate / unpublish / tags)
        working-directory: .cms-platform/e2e
        env:
          CMS_E2E_PAT: ${{ secrets.CMS_E2E_PAT }}
          TARGET: prod
          PR_NUMBER: ${{ inputs.pr_number }}
          PR_HEAD_REF: ${{ steps.pr.outputs.head_ref }}
        run: |
          set -o pipefail
          # --workers=1 serialises the three specs: they all mutate the
          # same preview env via Decap → cms/* PR → auto-merge →
          # deploy-preview (per-PR concurrency-grouped), so parallel
          # specs would queue multiple deploys deep and blow their
          # URL-wait budgets. --max-failures=1 bails on the first failure.
          npx playwright test \
            cms-publish-loop-prod-mutate-preview.spec.js \
            cms-unpublish-republish-preview.spec.js \
            cms-tags-lifecycle-preview.spec.js \
            --project=chromium-desktop-3k \
            --reporter=list \
            --max-failures=1 \
            --workers=1 \
            2>&1 | tee /tmp/preview-loops.log

      - name: Upload test results on failure
        if: ${{ failure() || cancelled() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1 (2026-04-10)
        with:
          name: preview-loops-results
          path: |
            /tmp/preview-loops.log
            .cms-platform/e2e/test-results/**
          if-no-files-found: ignore
          retention-days: 14

      - name: Post failure summary
        if: failure()
        uses: ./.cms-platform/.github/actions/post-failure-comment
        with:
          mode: post
          log-file: /tmp/preview-loops.log
          marker: preview-loops-failure-summary
          title: preview-loops
          pr-number: ${{ inputs.pr_number }}

      - name: Resolve failure summary on success
        if: success()
        uses: ./.cms-platform/.github/actions/post-failure-comment
        with:
          mode: resolve
          marker: preview-loops-failure-summary
          title: preview-loops
          pr-number: ${{ inputs.pr_number }}
