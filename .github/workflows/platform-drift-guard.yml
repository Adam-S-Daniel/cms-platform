# Reusable up-sync guard. Runs on a site PR: platform-owned files that live in
# the site (.claude/skills/) must byte-match the platform at the site's pinned
# ref. A PR that changes one fails the check with guidance to make the change
# in cms-platform instead — that's the site→platform route.
#
# As of v0.1.4 the admin/ machinery ships INSIDE the cms-platform-theme gem
# (theme/admin) rather than being vendored into each site, so it is no longer
# byte-match-guarded here — a gem bump (Dependabot) is the sync path. The only
# admin/ file a site still owns is the seam (admin/collections.site.yml), which
# was always exempt anyway. This guard now covers skills only.
name: Platform drift guard (reusable)

on:
  workflow_call:
    inputs:
      platform_repo: { type: string, default: Adam-S-Daniel/cms-platform }
      platform_ref:  { type: string, default: main }
      paths:         { type: string, default: ".claude/skills" }
      ignore:        { type: string, default: "" }

permissions:
  contents: read

jobs:
  guard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v6.0.2 (2026-01-09)
      - name: Fetch platform baseline
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v6.0.2 (2026-01-09)
        with:
          repository: ${{ inputs.platform_repo }}
          ref: ${{ inputs.platform_ref }}
          path: .cms-platform
      - name: Compare platform-owned files
        env:
          PATHS: ${{ inputs.paths }}
          IGNORE: ${{ inputs.ignore }}
          REF: ${{ inputs.platform_ref }}
          PLATFORM: ${{ inputs.platform_repo }}
        run: |
          set -uo pipefail
          # The platform stores skills under skills/; in the site they live under
          # .claude/skills/. Map site path -> platform path for the baseline.
          baseline_for() {
            case "$1" in
              .claude/skills/*) echo ".cms-platform/skills/${1#.claude/skills/}";;
              *) echo ".cms-platform/$1";;
            esac
          }
          drift=0
          for p in $PATHS; do
            [ -d "$p" ] || [ -f "$p" ] || continue
            while IFS= read -r -d '' f; do
              rel="${f#./}"
              case " $IGNORE " in *" $rel "*) continue;; esac
              base="$(baseline_for "$rel")"
              [ -f "$base" ] || continue   # site-only file → not platform-owned
              if ! diff -q "$f" "$base" >/dev/null 2>&1; then
                echo "::error file=$rel::'$rel' differs from ${PLATFORM}@${REF}. Make this change in cms-platform (open a PR there), tag a release, and let the bump flow back."
                drift=1
              fi
            done < <(find "$p" -type f -print0 2>/dev/null)
          done
          rm -rf .cms-platform
          if [ "$drift" = 1 ]; then
            echo "Platform-owned skills were edited in the site. Make the change in cms-platform (skills/) instead. (admin/ machinery ships via the theme gem and is no longer guarded here.)"
            exit 1
          fi
          echo "No platform drift."
