# Reusable e2e Playwright suite for platform sites.
#
# A consuming site calls this from a thin wrapper that owns the trigger
# + run-name (see examples/site/.github/workflows/e2e-tests.yml). The
# Playwright harness, specs, configs, and the post-failure-comment
# composite action all live in the PLATFORM repo, not the site, so this
# workflow checks the platform out into `.cms-platform/` (a dot-dir
# Jekyll ignores) and runs the suite from there:
#
#   cd .cms-platform/e2e && npm ci && npx playwright install --with-deps <browser>
#   npx playwright test
#
# The specs read their site identity from env — the central helpers
# (e2e/base.js, e2e/cms-host.js) are parameterized on CMS_PROD_URL /
# CMS_APEX / CMS_REPO / TARGET, so a new site needs only to pass its
# deployed URLs as workflow inputs. Pin `platform_ref` to the same
# tag/sha the caller pins this workflow to so the harness matches the
# workflow version.
#
# This is the FIRST of the e2e workflow family to be ported; the rest
# (cms-publish-loop-*, visual-regression, parity-preview, etc.) follow
# the same checkout-platform-into-.cms-platform pattern.
name: E2E Tests (reusable)

on:
  workflow_call:
    inputs:
      target:
        description: "TARGET for the suite: local | preview | prod. Selects how e2e/base.js resolves baseURL."
        required: false
        type: string
        default: prod
      prod_url:
        description: "Deployed production URL, e.g. https://example.com (scheme included). Wired to CMS_PROD_URL."
        required: false
        type: string
        default: ""
      apex:
        description: "Site apex domain, e.g. example.com (no scheme). Used to build preview-pr<N>.<apex> hosts; wired to CMS_APEX."
        required: false
        type: string
        default: ""
      browser:
        description: "Playwright browser to install with system deps (chromium | firefox | webkit | all)."
        required: false
        type: string
        default: chromium
      pr_number:
        description: "PR number to resolve a preview target / post failure comments against. Empty on non-PR triggers."
        required: false
        type: string
        default: ""
      platform_repo:
        description: "owner/name of the platform repo holding the e2e harness + composite action."
        required: false
        type: string
        default: Adam-S-Daniel/cms-platform
      platform_ref:
        description: "Tag/sha of the platform repo to fetch the harness from (pin to the same ref as this workflow)."
        required: false
        type: string
        default: main
    secrets:
      # Optional PAT for the GitHub API calls e2e/base.js makes when
      # TARGET=preview discovers the latest open PR, and for any real-lane
      # CMS specs. Optional: when unset, preview discovery falls back to
      # the job's GITHUB_TOKEN and real-lane specs that gate on a PAT
      # self-skip.
      CMS_E2E_PAT:
        required: false

permissions:
  contents: read
  # Needed by the post-failure-comment composite so it can post / update
  # the failure-summary comment on the PR.
  pull-requests: write

jobs:
  e2e:
    runs-on: ubuntu-latest
    env:
      # Site identity → the parameterized central helpers (e2e/base.js,
      # e2e/cms-host.js). See the workflow header for the env contract.
      TARGET: ${{ inputs.target }}
      CMS_PROD_URL: ${{ inputs.prod_url }}
      CMS_APEX: ${{ inputs.apex }}
      # The specs query the SITE repo's PRs (preview discovery, real-lane
      # CMS work), not the platform repo — so CMS_REPO is the caller's
      # repository, which github.repository resolves to in a reusable
      # workflow.
      CMS_REPO: ${{ github.repository }}
      PR_NUMBER: ${{ inputs.pr_number }}
    steps:
      - name: Checkout site
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2 (2026-01-09)

      - name: Checkout platform (e2e harness + composite action)
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2 (2026-01-09)
        with:
          repository: ${{ inputs.platform_repo }}
          ref: ${{ inputs.platform_ref }}
          path: .cms-platform

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0 (2026-04-20)
        with:
          node-version: "20"

      - name: Install harness deps
        working-directory: .cms-platform/e2e
        run: npm ci

      - name: Install Playwright browser + system deps
        working-directory: .cms-platform/e2e
        env:
          PW_BROWSER: ${{ inputs.browser }}
        run: |
          set -euo pipefail
          # `all` installs every supported engine; otherwise install the
          # single requested browser. --with-deps pulls the OS libraries
          # the engine needs on ubuntu-latest.
          if [ "$PW_BROWSER" = "all" ]; then
            npx playwright install --with-deps
          else
            npx playwright install --with-deps "$PW_BROWSER"
          fi

      - name: Run Playwright suite
        id: pw
        working-directory: .cms-platform/e2e
        env:
          # Self-skip / API auth for preview discovery + real-lane CMS
          # specs. Falls back to the job GITHUB_TOKEN when no PAT is set.
          CMS_E2E_PAT: ${{ secrets.CMS_E2E_PAT }}
          GITHUB_TOKEN: ${{ secrets.CMS_E2E_PAT || secrets.GITHUB_TOKEN }}
        run: |
          set -o pipefail
          npx playwright test --reporter=list 2>&1 | tee /tmp/playwright-output.log

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1 (2026-04-10)
        with:
          name: playwright-report
          path: .cms-platform/e2e/playwright-report
          if-no-files-found: ignore
          retention-days: 7

      # ── Failure summary on the PR ────────────────────────────────
      # Two call sites (post on failure / resolve on success), gated by
      # the caller-side failure()/success() primitives per the action's
      # v3 design. The composite is checked out under .cms-platform, so
      # reference it by that local path.
      - name: Post failure summary
        if: ${{ failure() && inputs.pr_number != '' }}
        uses: ./.cms-platform/.github/actions/post-failure-comment
        with:
          mode: post
          log-file: /tmp/playwright-output.log
          marker: e2e-failure-summary
          title: E2E tests
          pr-number: ${{ inputs.pr_number }}

      - name: Resolve failure summary on success
        if: ${{ success() && inputs.pr_number != '' }}
        uses: ./.cms-platform/.github/actions/post-failure-comment
        with:
          mode: resolve
          marker: e2e-failure-summary
          title: E2E tests
          pr-number: ${{ inputs.pr_number }}
