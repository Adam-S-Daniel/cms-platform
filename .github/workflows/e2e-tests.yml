# Reusable e2e Playwright suite for platform sites.
#
# A consuming site calls this from a thin wrapper that owns the trigger
# + run-name (see examples/site/.github/workflows/e2e-tests.yml). The
# Playwright harness, specs, configs, and the post-failure-comment
# composite action all live in the PLATFORM repo, not the site, so this
# workflow checks the platform out into `.cms-platform/` (a dot-dir
# Jekyll ignores) and runs the suite from there:
#
#   cd .cms-platform/e2e && npm ci && npx playwright install --with-deps <browser>
#   npx playwright test
#
# The specs read their site identity from env — the central helpers
# (e2e/base.js, e2e/cms-host.js) are parameterized on CMS_PROD_URL /
# CMS_APEX / CMS_REPO / TARGET, so a new site needs only to pass its
# deployed URLs as workflow inputs. Pin `platform_ref` to the same
# tag/sha the caller pins this workflow to so the harness matches the
# workflow version.
#
# Two lanes, selected by `target`:
#   * preview / prod — hit the DEPLOYED surface (no build). Run from the
#     platform checkout (`.cms-platform/e2e`); e2e/base.js resolves baseURL
#     from CMS_PROD_URL / CMS_APEX.
#   * local — run the FULL matrix against a freshly-built SITE: a real
#     `jekyll build` of the site + `npx serve _site` + `decap-server`, incl.
#     the @admin-write CMS round-trips. Because ~50 specs resolve the SITE
#     via `path.resolve(<harness>/e2e, "..")`, the harness is PLACED at
#     `<site>/e2e` (copied from the platform checkout) and SITE_ROOT is set
#     to $GITHUB_WORKSPACE so playwright.config.js's webServer builds/serves
#     the SITE. The site must exclude `e2e` + `.cms-platform` from its Jekyll
#     build (scaffold/create-site.js does this) and have a working Gemfile.
#
# This is the FIRST of the e2e workflow family to be ported; the rest
# (cms-publish-loop-*, visual-regression, parity-preview, etc.) follow
# the same checkout-platform-into-.cms-platform pattern.
name: E2E Tests (reusable)

on:
  workflow_call:
    inputs:
      target:
        description: "TARGET for the suite: local | preview | prod. Selects how e2e/base.js resolves baseURL."
        required: false
        type: string
        default: prod
      prod_url:
        description: "Deployed production URL, e.g. https://example.com (scheme included). Wired to CMS_PROD_URL."
        required: false
        type: string
        default: ""
      apex:
        description: "Site apex domain, e.g. example.com (no scheme). Used to build preview-pr<N>.<apex> hosts; wired to CMS_APEX."
        required: false
        type: string
        default: ""
      browser:
        description: "Playwright browser to install with system deps (chromium | firefox | webkit | all)."
        required: false
        type: string
        default: chromium
      pr_number:
        description: "PR number to resolve a preview target / post failure comments against. Empty on non-PR triggers."
        required: false
        type: string
        default: ""
      platform_repo:
        description: "owner/name of the platform repo holding the e2e harness + composite action."
        required: false
        type: string
        default: Adam-S-Daniel/cms-platform
      platform_ref:
        description: "Tag/sha of the platform repo to fetch the harness from (pin to the same ref as this workflow)."
        required: false
        type: string
        default: main
      prod_playground_mode:
        description: "Wired to PROD_PLAYGROUND_MODE in the job env. Prod-mutate / real-loop specs gate on it; leave empty for normal runs."
        required: false
        type: string
        default: ""
    secrets:
      # Optional PAT for the GitHub API calls e2e/base.js makes when
      # TARGET=preview discovers the latest open PR, and for any real-lane
      # CMS specs. Optional: when unset, preview discovery falls back to
      # the job's GITHUB_TOKEN and real-lane specs that gate on a PAT
      # self-skip.
      CMS_E2E_PAT:
        required: false

permissions:
  contents: read
  # Needed by the post-failure-comment composite so it can post / update
  # the failure-summary comment on the PR.
  pull-requests: write

jobs:
  e2e:
    runs-on: ubuntu-latest
    env:
      # Site identity → the parameterized central helpers (e2e/base.js,
      # e2e/cms-host.js). See the workflow header for the env contract.
      TARGET: ${{ inputs.target }}
      CMS_PROD_URL: ${{ inputs.prod_url }}
      CMS_APEX: ${{ inputs.apex }}
      # The specs query the SITE repo's PRs (preview discovery, real-lane
      # CMS work), not the platform repo — so CMS_REPO is the caller's
      # repository, which github.repository resolves to in a reusable
      # workflow.
      CMS_REPO: ${{ github.repository }}
      PR_NUMBER: ${{ inputs.pr_number }}
      # Gate for prod-mutate / real-loop specs (they self-skip unless this
      # is set to the value they expect). Inert when empty — the default.
      PROD_PLAYGROUND_MODE: ${{ inputs.prod_playground_mode }}
    steps:
      - name: Checkout site
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.2 (2026-01-09)

      - name: Checkout platform (e2e harness + composite action)
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.2 (2026-01-09)
        with:
          repository: ${{ inputs.platform_repo }}
          ref: ${{ inputs.platform_ref }}
          path: .cms-platform

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0 (2026-04-20)
        with:
          node-version: "20"

      - name: Install harness deps
        working-directory: .cms-platform/e2e
        run: npm ci

      - name: Install Playwright browser + system deps
        working-directory: .cms-platform/e2e
        env:
          PW_BROWSER: ${{ inputs.browser }}
        run: |
          set -euo pipefail
          # `all` installs every supported engine; otherwise install the
          # single requested browser. --with-deps pulls the OS libraries
          # the engine needs on ubuntu-latest.
          if [ "$PW_BROWSER" = "all" ]; then
            npx playwright install --with-deps
          else
            npx playwright install --with-deps "$PW_BROWSER"
          fi

      # ── LOCAL lane only: build + serve the SITE and run the FULL matrix ──
      # The local lane (target: local) runs a real `jekyll build` of the
      # SITE + decap-server + the @admin-write CMS round-trips, with the
      # harness checked out from the platform. The site-file reads in ~50
      # specs resolve the SITE via `path.resolve(<harness>/e2e, "..")`
      # (e2e/base.js's REPO_ROOT + each spec's own copy of that line). For
      # that to land on the consuming SITE, the harness must sit at
      # `<site>/e2e` — so we PLACE the npm-ci'd harness there. The
      # workspace root IS the checked-out site (the first checkout step), and
      # the consuming site removed its own `e2e/` in the dogfood (and excludes
      # `e2e`/`.cms-platform` from the Jekyll build), so there's no collision.
      # playwright.config.js's local webServer reads SITE_ROOT to know which
      # tree to `jekyll build` + serve + point decap-server at.
      - name: Place harness at site root (local lane)
        if: ${{ inputs.target == 'local' }}
        run: |
          set -euo pipefail
          # Copy the prepared harness (specs, config, AND node_modules from
          # `npm ci` above) to <workspace>/e2e so REPO_ROOT == the site.
          cp -a .cms-platform/e2e "$GITHUB_WORKSPACE/e2e"

      - name: Setup Ruby + Bundler (local lane)
        if: ${{ inputs.target == 'local' }}
        uses: ruby/setup-ruby@89f90524b88a01fe6e0b732220432cc6142926af  # v1.310.0 (2026-05-20)
        with:
          ruby-version: "3.2"
          bundler-cache: true   # bundle install + cache, keyed on the SITE Gemfile

      - name: Run Playwright suite
        id: pw
        # Local lane runs from the placed <site>/e2e so REPO_ROOT resolves
        # to the site; preview/prod run from the platform checkout (no build).
        working-directory: ${{ inputs.target == 'local' && 'e2e' || '.cms-platform/e2e' }}
        env:
          # Self-skip / API auth for preview discovery + real-lane CMS
          # specs. Falls back to the job GITHUB_TOKEN when no PAT is set.
          CMS_E2E_PAT: ${{ secrets.CMS_E2E_PAT }}
          GITHUB_TOKEN: ${{ secrets.CMS_E2E_PAT || secrets.GITHUB_TOKEN }}
          # SITE_ROOT — the CONSUMING site's checkout (github.workspace), in BOTH
          # lanes. Local lane: tells playwright.config.js's webServer which tree to
          # build + serve + run decap-server against (harness placed at <site>/e2e,
          # so github.workspace == that site). Preview/prod lane: the harness runs
          # from .cms-platform/e2e, so WITHOUT this the base_collections / single-
          # page guards' `__dirname/..` fallback resolves to the PLATFORM checkout
          # and a single-page consumer's guarded specs never skip (they read the
          # platform's five collections). github.workspace is the consumer root in
          # both lanes, so one unconditional value is correct. (It was previously
          # `|| ''` for non-local — a latent gap mirroring the loop reusables /
          # parity-preview #35.) Locked by e2e/loop-site-root-lint.test.js.
          SITE_ROOT: ${{ github.workspace }}
        run: |
          set -o pipefail
          npx playwright test --reporter=list 2>&1 | tee /tmp/playwright-output.log

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1 (2026-04-10)
        with:
          name: playwright-report
          # Local lane reports under <site>/e2e; preview/prod under the
          # platform checkout. Upload both globs; if-no-files-found: ignore
          # makes the absent one a no-op.
          path: |
            e2e/playwright-report
            .cms-platform/e2e/playwright-report
          if-no-files-found: ignore
          retention-days: 7

      # ── Failure summary on the PR ────────────────────────────────
      # Two call sites (post on failure / resolve on success), gated by
      # the caller-side failure()/success() primitives per the action's
      # v3 design. The composite is checked out under .cms-platform, so
      # reference it by that local path.
      - name: Post failure summary
        if: ${{ failure() && inputs.pr_number != '' }}
        uses: ./.cms-platform/.github/actions/post-failure-comment
        with:
          mode: post
          log-file: /tmp/playwright-output.log
          marker: e2e-failure-summary
          title: E2E tests
          pr-number: ${{ inputs.pr_number }}

      - name: Resolve failure summary on success
        if: ${{ success() && inputs.pr_number != '' }}
        uses: ./.cms-platform/.github/actions/post-failure-comment
        with:
          mode: resolve
          marker: e2e-failure-summary
          title: E2E tests
          pr-number: ${{ inputs.pr_number }}
