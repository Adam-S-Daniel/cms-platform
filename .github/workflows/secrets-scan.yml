# Gitleaks secrets scanning. Runs on every PR (diff scan), on every
# push to main (incremental scan), and weekly (full-history sweep) so
# a leak introduced via a force-push or rebase still surfaces.
#
# No GITLEAKS_LICENSE: gitleaks-action is free for public repos and
# personal-account repos per its EULA, which is how this platform and
# the sites built on it are licensed.
#
# Allowlist for known test fixtures lives in .gitleaks.toml.
name: Secrets scan
on:
  workflow_call:
permissions:
  contents: read
  pull-requests: read

concurrency:
  group: secrets-scan-${{ github.event_name }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2 (2026-01-09)
        with:
          # fetch-depth: 0 is required by gitleaks-action so it can
          # diff against the base ref on PRs and walk full history on
          # schedule/push events. A shallow clone produces incomplete
          # results — see gitleaks-action README.
          fetch-depth: 0

      - name: Gitleaks
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7  # v2.3.9 (2025-04-17)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Pin the underlying gitleaks binary so behaviour is
          # reproducible across runs. Bump deliberately.
          GITLEAKS_VERSION: '8.30.1'  # 2026-03-21
          GITLEAKS_ENABLE_UPLOAD_ARTIFACT: 'true'
          GITLEAKS_ENABLE_SUMMARY: 'true'

