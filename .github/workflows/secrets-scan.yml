# Gitleaks secrets scanning. Runs on every PR (diff scan), on every
# push to main (incremental scan), and weekly (full-history sweep) so
# a leak introduced via a force-push or rebase still surfaces.
#
# Runs the open-source gitleaks BINARY directly rather than the
# gitleaks-action wrapper: that action requires a paid GITLEAKS_LICENSE
# for ORGANIZATION-owned repos (e.g. jodidaniel/*) — it fails closed with
# "missing gitleaks license" — while the binary itself is MIT-licensed and
# free for every repo. Using the binary keeps this reusable portable across
# both user- and org-owned consumer sites. (Public-vs-private is irrelevant;
# the action's gate is account type.)
#
# Allowlist for known test fixtures lives in .gitleaks.toml — read with
# --config when the consumer ships one; the upstream default ruleset is
# used otherwise.
name: Secrets scan
on:
  workflow_call:
permissions:
  contents: read
  pull-requests: read

concurrency:
  group: secrets-scan-${{ github.event_name }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.2 (2026-01-09)
        with:
          # fetch-depth: 0 so the scan can diff base..head on PRs and walk
          # full history on schedule/push events. A shallow clone produces
          # incomplete results.
          fetch-depth: 0

      - name: Install gitleaks
        env:
          # Pin the binary so behaviour is reproducible across runs.
          # scripts/secrets-scan.sh parses this exact line — keep the
          # `GITLEAKS_VERSION: 'X.Y.Z'` shape. Bump deliberately.
          GITLEAKS_VERSION: '8.30.1'  # 2026-03-21
        run: |
          set -euo pipefail
          tarball="gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          url="https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/${tarball}"
          curl -fsSL --retry 3 "$url" -o /tmp/gitleaks.tgz
          tar -xzf /tmp/gitleaks.tgz -C /tmp gitleaks
          sudo install -m 0755 /tmp/gitleaks /usr/local/bin/gitleaks
          gitleaks version

      - name: Scan for secrets
        env:
          EVENT_NAME: ${{ github.event_name }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          args=(git --redact --no-banner --verbose)
          if [ -f .gitleaks.toml ]; then
            echo "Using repo .gitleaks.toml"
            args+=(--config .gitleaks.toml)
          else
            echo "No .gitleaks.toml — using gitleaks' upstream default ruleset"
          fi
          # On PRs scan only the commits the PR introduces (base..head); on
          # push / schedule / workflow_dispatch scan the full reachable
          # history. Fall back to a full scan if the base commit isn't
          # present (e.g. a force-pushed base).
          if [ "$EVENT_NAME" = "pull_request" ] && [ -n "${BASE_SHA:-}" ] \
             && git cat-file -e "${BASE_SHA}^{commit}" 2>/dev/null; then
            echo "Scanning PR range ${BASE_SHA}..${HEAD_SHA}"
            args+=("--log-opts=${BASE_SHA}..${HEAD_SHA}")
          else
            echo "Scanning full history"
          fi
          # gitleaks exits non-zero when it finds leaks (default --exit-code 1),
          # which fails the job — exactly the gate we want.
          gitleaks "${args[@]}" .
