name: CMS loop lane gate
description: >-
  Serialize the three real-prod-mutating loops (cms-publish-loop-prod /
  cms-media-roundtrip / cms-publish-loop-host) WITHOUT the eviction that a
  shared GitHub `concurrency` group causes. A native concurrency group holds
  at most one running + one pending run, so when a single push is salient to
  two loops they co-arrive in the group and GitHub CANCELS the older pending
  sibling instead of queuing it (#70 — the same cancel-in-progress:false
  mechanic behind #1815). Each loop now uses its OWN per-loop concurrency
  group (so GitHub never evicts a cross-loop sibling and the LATEST run is
  always the one it keeps), and mutual exclusion is enforced HERE instead:
  this gate blocks until no OTHER real-prod loop run that STARTED BEFORE this
  one (strictly lower run id) is still in flight. Ordering by run id is a
  total order, so co-arriving siblings can't deadlock — the lowest-id run
  proceeds, the rest queue behind it in id order. FAIL-OPEN: bounded by
  `timeout-seconds`; if a sibling hangs past it, this run proceeds anyway
  (the deploy-production lane's own `group: production` queue + the
  deploy-queue extender are the collision backstop). Bash + node only — no
  transitive `uses:` (clean for SHA-pinning; mirrors await-prod-deploy).

inputs:
  run-id:
    description: "This workflow run's id (github.run_id). Siblings with a LOWER id ran first and are awaited."
    required: false
    default: ${{ github.run_id }}
  repo:
    description: "owner/name (defaults to the current repo)."
    required: false
    default: ${{ github.repository }}
  token:
    description: "Token with `actions: read` scope to query workflow runs."
    required: false
    default: ${{ github.token }}
  loop-workflow-files:
    description: >-
      Space-separated basenames of the real-prod loop workflow files to treat
      as siblings (this run's own file included; it is excluded by the
      lower-run-id filter). MUST stay byte-identical across the three loops
      (drift-locked by e2e/workflow-prod-loop-serialized.test.js).
    required: false
    default: "cms-publish-loop-prod.yml cms-media-roundtrip.yml cms-publish-loop-host.yml"
  poll-seconds:
    description: "Seconds between sibling-state polls."
    required: false
    default: "15"
  timeout-seconds:
    description: >-
      Max time to wait for earlier siblings before proceeding fail-open. Keep
      below the loop job's timeout-minutes so the gate never eats the whole
      budget.
    required: false
    default: "2700"

runs:
  using: composite
  steps:
    - name: Wait for earlier real-prod loop runs to finish
      shell: bash
      env:
        LG_RUN_ID: ${{ inputs.run-id }}
        LG_REPO: ${{ inputs.repo }}
        LG_TOKEN: ${{ inputs.token }}
        LG_FILES: ${{ inputs.loop-workflow-files }}
        LG_POLL_S: ${{ inputs.poll-seconds }}
        LG_TIMEOUT_S: ${{ inputs.timeout-seconds }}
      run: |
        set -uo pipefail
        echo "::group::Loop lane gate (run $LG_RUN_ID)"

        api() {
          curl -fsS --max-time 25 \
            -H "Authorization: Bearer $LG_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com$1"
        }
        # Print the ids of runs of $1 (workflow file) in status $2 whose id
        # is strictly LESS than my run id, one per line. Empty on any error
        # (fail-open for this poll — never block on an unknowable).
        earlier_ids() {
          api "/repos/$LG_REPO/actions/workflows/$1/runs?status=$2&per_page=100&exclude_pull_requests=true" 2>/dev/null \
            | LG_MINE="$LG_RUN_ID" node -e '
              let s="";process.stdin.on("data",d=>s+=d).on("end",()=>{
                try{
                  const mine=Number(process.env.LG_MINE);
                  const j=JSON.parse(s);
                  for(const r of (j.workflow_runs||[])){
                    if(Number(r.id) < mine) process.stdout.write(r.id+"\n");
                  }
                }catch(e){/* fail-open: print nothing */}
              });' 2>/dev/null || true
        }

        deadline=$(( $(date +%s) + LG_TIMEOUT_S ))
        while :; do
          waiting=""
          for wf in $LG_FILES; do
            for st in in_progress queued; do
              ids="$(earlier_ids "$wf" "$st")"
              if [ -n "$ids" ]; then
                waiting="$waiting $(printf '%s' "$ids" | tr '\n' ' ')"
              fi
            done
          done
          waiting="$(printf '%s' "$waiting" | tr -s ' ')"
          if [ -z "${waiting// /}" ]; then
            echo "No earlier real-prod loop run in flight — lane is free; proceeding."
            echo "::endgroup::"; exit 0
          fi
          now=$(date +%s)
          if [ "$now" -ge "$deadline" ]; then
            echo "::warning::Loop lane gate timed out after ${LG_TIMEOUT_S}s still waiting on earlier loop run(s):${waiting}. Proceeding FAIL-OPEN (deploy-production's own queue + the deploy-queue extender are the collision backstop)."
            echo "::endgroup::"; exit 0
          fi
          echo "Earlier real-prod loop run(s) in flight:${waiting} — waiting ${LG_POLL_S}s (lane held; queuing, not evicting)…"
          sleep "$LG_POLL_S"
        done
